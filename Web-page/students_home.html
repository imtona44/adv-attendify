/* ================= BACKGROUND ================= */

/* ===== OFFLINE BANNER ===== */
.offline-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #ff6b6b;
    color: white;
    text-align: center;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    z-index: 10000;
    display: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    backdrop-filter: blur(5px);
    border-bottom: 1px solid #ff8a8a;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from {
        transform: translateY(-100%);
    }
    to {
        transform: translateY(0);
    }
}

.offline-banner i {
    margin-right: 8px;
}

.offline-banner button {
    background: white;
    color: #ff6b6b;
    border: none;
    padding: 4px 12px;
    border-radius: 20px;
    margin-left: 15px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
}

.offline-banner button:hover {
    background: #f0f0f0;
    transform: scale(1.05);
}

<body>

<!-- OFFLINE BANNER -->
<div id="offlineBanner" class="offline-banner">
    <i class="fas fa-wifi-slash"></i>
    <span id="offlineMessage">You are offline. Please check your internet connection.</span>

<!-- ===== LOAD SIDEBAR HERE ===== -->
<div id="sidebarContainer"></div>

<!-- Navbar -->
<nav>

    <div class="profile-wrapper">

            <img src="images/profile.png" id="navProfileImage" alt="Profile">

        <div id="profileMenu" class="profile-menu">

<!-- STUDENT PANEL -->
<section class="hero">
    <div class="main-panel student-card">

        <div class="student-left">
            <img src="images/profile2.png" id="mainProfileImage" class="student-photo" alt="Profile">
            <div class="name-pill" id="fullNameDisplay">Loading...</div>

            <div class="esign-container">
                <div class="esign-display">
                    <canvas id="esignCanvas" width="250" height="100"></canvas>
                    <div class="esign-controls" id="esignControls" style="display: none;">
                        <button class="esign-btn esign-save-btn" onclick="saveESignature()">Save</button>
                        <button class="esign-btn esign-clear-btn" onclick="clearESignature()">Clear</button>
                    </div>
                    <button class="edit-esign-btn" onclick="editESignature()" id="editESignBtn">Edit Signature</button>
                </div>

            </div>

        <div class="student-right">

<!-- SweetAlert2 JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// Initialize Supabase client
const { createClient } = supabase;

const supabaseClient = createClient(
    "https://tmyrnjdwaayelrctqppg.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteXJuamR3YWF5ZWxyY3RxcHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDgzODEsImV4cCI6MjA4Njg4NDM4MX0.w_DhdLWk4gA-x434kSobbXjG83IXHpakhRsaig-zMpw"
);

// ===== OFFLINE DETECTION =====
let isOffline = !navigator.onLine;
const offlineBanner = document.getElementById('offlineBanner');
const editESignBtn = document.getElementById('editESignBtn');

// Function to update UI based on connection status
function updateOnlineStatus() {
    isOffline = !navigator.onLine;
    
    if (isOffline) {
        offlineBanner.style.display = 'block';
        // Disable signature editing when offline
        if (editESignBtn) {
            editESignBtn.disabled = true;
            editESignBtn.title = 'You need an internet connection to edit signature';
        }
    } else {
        offlineBanner.style.display = 'none';
        if (editESignBtn) {
            editESignBtn.disabled = false;
            editESignBtn.title = '';
        }
    }
}

// Function to check connection and reload if online
async function checkConnectionAndReload() {
    try {
        // Try to fetch a small resource to verify connection
        const response = await fetch('https://tmyrnjdwaayelrctqppg.supabase.co/rest/v1/', {
            method: 'HEAD',
            mode: 'no-cors'
        });
        
        if (navigator.onLine) {
            offlineBanner.style.display = 'none';
            if (editESignBtn) {
                editESignBtn.disabled = false;
                editESignBtn.title = '';
            }
            Swal.fire({
                title: 'Connected!',
                text: 'You are back online.',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false,
                background: '#0b2a3a',
                color: '#dffaff'
            });
            // Reload data
            loadStudentData();
        } else {
            Swal.fire({
                title: 'Still Offline',
                text: 'Unable to connect to the internet. Please check your connection.',
                icon: 'error',
                background: '#0b2a3a',
                color: '#dffaff',
                confirmButtonColor: '#00f2ff'
            });
        }
    } catch (error) {
        Swal.fire({
            title: 'Connection Failed',
            text: 'Unable to connect to the server. Please check your internet connection.',
            icon: 'error',
            background: '#0b2a3a',
            color: '#dffaff',
            confirmButtonColor: '#00f2ff'
        });
    }
}

// Add event listeners for online/offline events
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// Initial check
updateOnlineStatus();

// Get current user ID from localStorage
const currentUserId = localStorage.getItem('userId');
const userType = localStorage.getItem('userType');

// Redirect if not logged in or not a student
if (!currentUserId || userType !== 'student') {
    window.location.href = 'index.html';
}

// Default image path
const DEFAULT_PROFILE_IMAGE = 'images/profile2.png';
const DEFAULT_NAV_IMAGE = 'images/profile.png';

// Signature Pad instance
let signaturePad = null;
let isEditingSignature = false;

// Initialize signature pad - UPDATED with translucent gray background
function initSignaturePad() {
    const canvas = document.getElementById('esignCanvas');
    signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'rgba(128, 128, 128, 0.3)', // Translucent gray background
        penColor: 'rgb(0, 0, 0)',
        velocityFilterWeight: 0.7,
        minWidth: 0.5,
        maxWidth: 2.5,
        throttle: 16
    });
    
    // Set initial background
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(128, 128, 128, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Make canvas read-only initially
    signaturePad.off();
    
    // Handle canvas resize for responsive design
    function resizeCanvas() {
        const canvas = document.getElementById('esignCanvas');
        const container = canvas.parentElement;
        const maxWidth = Math.min(250, container.clientWidth - 20);
        
        // Store the signature data
        let signatureData = null;
        if (signaturePad && !signaturePad.isEmpty()) {
            signatureData = signaturePad.toData();
        }
        
        // Resize canvas
        canvas.width = maxWidth;
        canvas.height = maxWidth * 0.4; // Maintain aspect ratio
        
        // Set background after resize
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(128, 128, 128, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Restore signature if it existed
        if (signatureData) {
            signaturePad.fromData(signatureData);
        }
    }
    
    // Call on resize
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);
}

// Function to load student data from database
async function loadStudentData() {
    // Check if offline
    if (isOffline) {
        loadFromLocalStorage();
        return;
    }

    try {
        const { data: studentData, error } = await supabaseClient
            .from('student')
            .select('*')
            .eq('id', currentUserId)
            .single();

        if (error) {
            console.error('Error loading student data:', error);
            loadFromLocalStorage();
            return;
        }

        if (studentData) {
            displayStudentData(studentData);
            // Store year-section in localStorage for offline fallback
            if (studentData['year-section']) {
                localStorage.setItem('userYearSection', studentData['year-section']);
            }
        }
    } catch (error) {
        console.error('Error:', error);
        loadFromLocalStorage();
    }
}

// Display student data - UPDATED with year-section display
function displayStudentData(studentData) {
    // Display full name
    const fullName = `${studentData.fname || ''} ${studentData.lname || ''}`.trim();
    document.getElementById('fullNameDisplay').textContent = fullName || 'Full Name';
    
    // Display Year and Section
    const yearSectionElement = document.getElementById('yearSectionDisplay');
    if (studentData['year-section']) {
        yearSectionElement.textContent = `Year - Section: ${studentData['year-section']}`;
    } else {
        yearSectionElement.textContent = 'Year - Section: Not set';
    }
    
    // Display E-Signature from database
    const canvas = document.getElementById('esignCanvas');
    const ctx = canvas.getContext('2d');
    
    if (studentData['e-sign']) {
        try {
            const signatureData = JSON.parse(studentData['e-sign']);
            if (signaturePad && signatureData) {
                // Set background first
                ctx.fillStyle = 'rgba(128, 128, 128, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Then draw signature
                signaturePad.fromData(signatureData);
            }
        } catch (e) {
            signaturePad.clear();
            // Set background after clearing
            ctx.fillStyle = 'rgba(128, 128, 128, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    } else {
        if (signaturePad) {
            signaturePad.clear();
            // Set background after clearing
            ctx.fillStyle = 'rgba(128, 128, 128, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
    
    // Display About Me (info column)
    const aboutInput = document.getElementById('aboutInput');
    if (studentData.info) {
        aboutInput.value = studentData.info;
    } else {
        aboutInput.value = '';
    }
    
    // Display Profile Picture
    if (studentData['profile-pic']) {
        document.getElementById('mainProfileImage').src = studentData['profile-pic'];
        document.getElementById('navProfileImage').src = studentData['profile-pic'];
    } else {
        document.getElementById('mainProfileImage').src = DEFAULT_PROFILE_IMAGE;
        document.getElementById('navProfileImage').src = DEFAULT_NAV_IMAGE;
    }
    
    // Update localStorage
    localStorage.setItem('userFullName', fullName);
    if (studentData['profile-pic']) {
        localStorage.setItem('profileImage', studentData['profile-pic']);
    }
}

// Load from localStorage as fallback
function loadFromLocalStorage() {
    const fullName = localStorage.getItem('userFullName') || 'Full Name';
    document.getElementById('fullNameDisplay').textContent = fullName;
    
    // Load year-section from localStorage
    const yearSection = localStorage.getItem('userYearSection');
    const yearSectionElement = document.getElementById('yearSectionDisplay');
    if (yearSection) {
        yearSectionElement.textContent = `Year - Section: ${yearSection}`;
    } else {
        yearSectionElement.textContent = 'Year - Section: Not set';
    }
    
    const savedImage = localStorage.getItem('profileImage');
    if (savedImage) {
        document.getElementById('mainProfileImage').src = savedImage;
        document.getElementById('navProfileImage').src = savedImage;
    }
}

// Function to update E-Signature in database
async function updateESignature() {
    // Check if offline
    if (isOffline) {
        Swal.fire({
            title: 'No Internet Connection',
            text: 'You need an internet connection to save your signature.',
            icon: 'error',
            background: '#0b2a3a',
            color: '#dffaff',
            confirmButtonColor: '#00f2ff'
        });
        return false;
    }

    if (!signaturePad || signaturePad.isEmpty()) {
        // If signature is empty, save empty string
        const { error } = await supabaseClient
            .from('student')
            .update({ 'e-sign': '' })
            .eq('id', currentUserId);

        if (!error) {
            Swal.fire({
                title: 'Cleared',
                text: 'Signature has been cleared.',
                icon: 'info',
                timer: 1500,
                showConfirmButton: false,
                background: '#0b2a3a',
                color: '#dffaff'
            });
        }
        return true;
    }

    try {
        // Get signature data as JSON
        let signatureValue = '';

        if (!signaturePad.isEmpty()) {
            signatureValue = JSON.stringify(signaturePad.toData());
        }

        const { error } = await supabaseClient
            .from('student')
            .update({ "e-sign": signatureValue })
            .eq('id', currentUserId);

        if (error) {
            console.error('Error updating e-signature:', error);
            Swal.fire({
                title: 'Error',
                text: 'Failed to update signature. Please try again.',
                icon: 'error',
                background: '#0b2a3a',
                color: '#dffaff',
                confirmButtonColor: '#00f2ff'
            });
            return false;
        }

        return true;
    } catch (error) {
        console.error('Error:', error);
        return false;
    }
}

// Function to update About Me in database
async function updateAboutMe(newAbout) {
    // Check if offline
    if (isOffline) {
        Swal.fire({
            title: 'No Internet Connection',
            text: 'You need an internet connection to save your about me.',
            icon: 'error',
            timer: 2000,
            showConfirmButton: false,
            background: '#0b2a3a',
            color: '#dffaff'
        });
        return false;
    }

    try {
        const { error } = await supabaseClient
            .from('student')
            .update({ info: newAbout })
            .eq('id', currentUserId);

        if (error) {
            console.error('Error updating about me:', error);
            return false;
        }

        return true;
    } catch (error) {
        console.error('Error:', error);
        return false;
    }
}

// Toggle signature edit mode
function editESignature() {
    // Check if offline
    if (isOffline) {
        Swal.fire({
            title: 'No Internet Connection',
            text: 'You need an internet connection to edit your signature.',
            icon: 'error',
            background: '#0b2a3a',
            color: '#dffaff',
            confirmButtonColor: '#00f2ff'
        });
        return;
    }

    const controls = document.getElementById('esignControls');
    const editBtn = document.getElementById('editESignBtn');
    const canvas = document.getElementById('esignCanvas');
    
    if (!isEditingSignature) {
        // Enable editing
        controls.style.display = 'flex';
        editBtn.textContent = 'Cancel Edit';
        editBtn.style.background = 'rgba(255, 107, 107, 0.8)';
        
        // Enable signature pad
        if (signaturePad) {
            signaturePad.on();
        }
        
        // Change cursor style
        canvas.style.cursor = 'crosshair';
        
        isEditingSignature = true;
    } else {
        // Disable editing
        controls.style.display = 'none';
        editBtn.textContent = 'Edit Signature';
        editBtn.style.background = 'linear-gradient(135deg, #00f2ff, #7f5cff)';
        
        // Disable signature pad
        if (signaturePad) {
            signaturePad.off();
        }
        
        // Reset cursor
        canvas.style.cursor = 'pointer';
        
        // Reload the original signature
        loadStudentData();
        
        isEditingSignature = false;
    }
}

// Save signature
async function saveESignature() {
    if (!signaturePad) return;
    
    // Show loading
    Swal.fire({
        title: 'Saving...',
        text: 'Please wait',
        allowOutsideClick: false,
        showConfirmButton: false,
        willOpen: () => {
            Swal.showLoading();
        },
        background: '#0b2a3a',
        color: '#dffaff'
    });
    
    const success = await updateESignature();
    
    if (success) {
        Swal.fire({
            title: 'Saved!',
            text: 'Your signature has been updated.',
            icon: 'success',
            timer: 1500,
            showConfirmButton: false,
            background: '#0b2a3a',
            color: '#dffaff'
        });
        
        // Exit edit mode
        editESignature();
    } else {
        Swal.fire({
            title: 'Error',
            text: 'Failed to save signature. Please try again.',
            icon: 'error',
            background: '#0b2a3a',
            color: '#dffaff',
            confirmButtonColor: '#00f2ff'
        });
    }
}

// Clear signature - UPDATED with translucent gray background
function clearESignature() {
    if (signaturePad) {
        signaturePad.clear();
        // Set background color after clearing
        const canvas = document.getElementById('esignCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(128, 128, 128, 0.3)'; // Translucent gray
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

/* ===== load sidebar component ===== */
fetch("students_sidebar.html")
.then(r => r.text())
.then(html => {
    document.getElementById("sidebarContainer").innerHTML = html;
    initializeSidebar();
});

function initializeSidebar() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    
    if (sidebar && overlay) {
        window.toggleMenu = function(){
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
        };
        
        overlay.onclick = toggleMenu;
    }
}

// Logout confirmation function
function confirmLogout() {
    Swal.fire({
        title: 'Are you sure?',
        text: "You will be logged out of your account!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#00f2ff',
        cancelButtonColor: '#ff6b6b',
        confirmButtonText: 'Yes, logout',
        cancelButtonText: 'Cancel',
        background: '#0b2a3a',
        color: '#dffaff'
    }).then((result) => {
        if (result.isConfirmed) {
            // Clear all user data from localStorage
            localStorage.clear();
            
            Swal.fire({
                title: 'Logged Out!',
                text: 'You have been successfully logged out.',
                icon: 'success',
                confirmButtonColor: '#00f2ff',
                background: '#0b2a3a',
                color: '#dffaff'
            }).then(() => {
                window.location.href = 'index.html';
            });
        }
    });
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    // Initialize signature pad
    initSignaturePad();
    
    // Load student data
    loadStudentData();
});

/* ===== about me save with database ===== */
const aboutInput = document.getElementById("aboutInput");
const saveIndicator = document.getElementById("saveIndicator");
let saveTimeout;

aboutInput.addEventListener("keydown", async function(e){
    if(e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        
        // Show saving indicator
        saveIndicator.style.display = 'block';
        saveIndicator.textContent = 'Saving...';
        
        const success = await updateAboutMe(aboutInput.value);
        
        if (success) {
            saveIndicator.textContent = 'Saved!';
            setTimeout(() => {
                saveIndicator.style.display = 'none';
            }, 2000);
        } else {
            saveIndicator.textContent = 'Save failed';
            setTimeout(() => {
                saveIndicator.style.display = 'none';
            }, 2000);
        }
        
        aboutInput.blur();
    }
});

// Auto-save when clicking away
aboutInput.addEventListener("blur", async function () {
    saveIndicator.style.display = 'block';
    saveIndicator.textContent = 'Saving...';

    const success = await updateAboutMe(aboutInput.value);

    saveIndicator.textContent = success ? 'Saved!' : 'Save failed';

    setTimeout(() => {
        saveIndicator.style.display = 'none';
    }, 2000);
});

/* profile dropdown */
function toggleProfileMenu(){
    const profileMenu = document.getElementById("profileMenu");
    profileMenu.classList.toggle("active");
}

document.addEventListener("click", function(e){
    const profile = document.querySelector(".profile");
    const menu = document.getElementById("profileMenu");
    if(!profile.contains(e.target) && !menu.contains(e.target)){
        menu.classList.remove("active");
    }
});

setInterval(loadStudentData, 30000);

// Expose functions globally
window.checkConnectionAndReload = checkConnectionAndReload;
window.saveESignature = saveESignature;
window.clearESignature = clearESignature;
window.editESignature = editESignature;
</script>
