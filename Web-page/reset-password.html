<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reset Password | ADV-Attendify</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/websitelogo.png">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CryptoJS for password hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                url('images/csulogo.png') left 20px top 20px/61px 61px no-repeat,
                url('images/coealogo.png') left 90px top 20px/61px 61px no-repeat,
                url('images/icpeplogo.png') left 160px top 20px/61px 61px no-repeat,
                url('images/background.jpg') center/cover no-repeat fixed;
            padding: 20px;
            position: relative;
        }

        /* Subtle overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: 0;
            pointer-events: none;
        }

        /* Responsive background logos */
        @media (max-width: 768px) {
            body {
                background: 
                    url('images/csulogo.png') left 15px top 15px/45px 45px no-repeat,
                    url('images/coealogo.png') left 70px top 15px/45px 45px no-repeat,
                    url('images/icpeplogo.png') left 125px top 15px/45px 45px no-repeat,
                    url('images/background.jpg') center/cover no-repeat fixed;
                padding: 70px 15px 15px 15px;
            }
        }

        @media (max-width: 600px) {
            body {
                background: 
                    url('images/csulogo.png') center top 15px/45px 45px no-repeat,
                    url('images/coealogo.png') center top 15px/45px 45px no-repeat,
                    url('images/icpeplogo.png') center top 15px/45px 45px no-repeat,
                    url('images/background.jpg') center/cover no-repeat fixed;
                background-position: calc(50% - 60px) 15px, center 15px, calc(50% + 60px) 15px, center;
                padding: 70px 15px 15px 15px;
            }
        }

        @media (max-width: 480px) {
            body {
                background: 
                    url('images/csulogo.png') center top 12px/40px 40px no-repeat,
                    url('images/coealogo.png') center top 12px/40px 40px no-repeat,
                    url('images/icpeplogo.png') center top 12px/40px 40px no-repeat,
                    url('images/background.jpg') center/cover no-repeat fixed;
                background-position: calc(50% - 50px) 12px, center 12px, calc(50% + 50px) 12px, center;
                padding: 60px 12px 12px 12px;
            }
        }

        /* Glass panel card */
        .card {
            width: 100%;
            max-width: 480px;
            max-height: auto;
            border-radius: 28px;
            background: rgba(20, 30, 50, 0.55);
            backdrop-filter: blur(18px) saturate(150%);
            border: 1px solid rgba(110, 243, 255, 0.25);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            padding: 30px 30px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .card {
                max-width: 100%;
                border-radius: 24px;
                padding: 25px 25px;
            }
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 22px;
                padding: 22px 20px;
            }
        }

        @media (max-width: 400px) {
            .card {
                border-radius: 20px;
                padding: 18px 16px;
            }
        }

        /* Key icon only - no circle background */
        .reset-icon {
            text-align: center;
            margin: 0 auto 15px;
            line-height: 1;
        }

        .reset-icon i {
            font-size: 4.5rem;
            color: #6ef3ff;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        @media (max-width: 480px) {
            .reset-icon i {
                font-size: 4rem;
            }
        }

        @media (max-width: 360px) {
            .reset-icon i {
                font-size: 3.5rem;
            }
        }

        /* Headings */
        h1 {
            color: #6ef3ff;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            color: #b8e9ff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 28px;
            }
            .subtitle {
                font-size: 15px;
                margin-bottom: 16px;
            }
        }

        @media (max-width: 360px) {
            h1 {
                font-size: 24px;
            }
            .subtitle {
                font-size: 14px;
            }
        }

        /* Info badge */
        .info-badge {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 0.7rem 1.2rem;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(110, 243, 255, 0.25);
            color: #b8e9ff;
            font-size: 0.95rem;
            font-weight: 500;
            width: 100%;
            justify-content: center;
        }

        .info-badge i {
            color: #6ef3ff;
        }

        @media (max-width: 400px) {
            .info-badge {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
                margin-bottom: 20px;
            }
        }

        /* Form container */
        .form-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(110, 243, 255, 0.15);
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 20px 15px;
                border-radius: 16px;
                margin-bottom: 20px;
            }
        }

        /* Input groups */
        .input-group {
            margin-bottom: 1.8rem;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b8e9ff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-group label i {
            color: #6ef3ff;
            width: 20px;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .input-group {
                margin-bottom: 1.5rem;
            }
            .input-group label {
                font-size: 13px;
                margin-bottom: 6px;
            }
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            width: 100%;
            padding: 14px 3rem 14px 16px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .password-wrapper input:focus {
            outline: none;
            border-color: #00f2ff;
            box-shadow: 0 0 0 3px rgba(0, 242, 255, 0.35);
            background: rgba(255, 255, 255, 0.14);
        }

        .password-wrapper input::placeholder {
            color: #a9b4d6;
            opacity: 0.8;
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #a9b4d6;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .toggle-pw:hover {
            color: #6ef3ff;
        }

        @media (max-width: 480px) {
            .password-wrapper input {
                padding: 12px 2.8rem 12px 14px;
                font-size: 14px;
            }
            .toggle-pw {
                font-size: 1.2rem;
                right: 12px;
            }
        }

        /* Strength meter */
        .strength-bar {
            margin-top: 10px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            gap: 4px;
        }

        .strength-segment {
            flex: 1;
            height: 100%;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 6px;
            font-weight: 600;
            color: #a9b4d6;
            display: flex;
            justify-content: flex-end;
        }

        .hint {
            font-size: 0.8rem;
            color: #a9b4d6;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hint i {
            color: #6ef3ff;
        }

        /* Alert messages */
        .error-message, .success-message {
            padding: 0.8rem 1rem;
            border-radius: 50px;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        .error-message {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .hidden {
            display: none;
        }

        /* Action button - matches login button exactly */
        .btn {
            width: 60%;
            padding: 14px 10px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #020617;
            background: linear-gradient(135deg, #00f2ff, #7f5cff);
            transition: 0.3s;
            display: block;
            margin: 0 auto 20px auto;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .btn i {
            margin-right: 8px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 35px rgba(0, 242, 255, 0.5);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 600px) {
            .btn {
                width: 70%;
                padding: 13px 9px;
                font-size: 15.5px;
            }
        }

        @media (max-width: 480px) {
            .btn {
                width: 80%;
                padding: 11px 7px;
                font-size: 14.5px;
                border-radius: 36px;
                margin-bottom: 18px;
            }
        }

        @media (max-width: 360px) {
            .btn {
                width: 90%;
                padding: 10px 6px;
                font-size: 14px;
            }
        }

        /* Footer links - removed */
        .footer-links {
            display: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            color: #ffffff;
            font-size: 0.8rem;
            gap: 8px;
            margin: 0.8rem 0 0.5rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(110, 243, 255, 0.3), transparent);
        }

        .additional-note {
            color: #ffffff;
            font-size: 13px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* User email display */
        #userEmailDisplay {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 0.7rem 1.2rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(110, 243, 255, 0.25);
            color: #b8e9ff;
            font-size: 0.95rem;
            font-weight: 500;
            width: 100%;
            justify-content: center;
        }

        #userEmailDisplay i {
            color: #6ef3ff;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .additional-note {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Key icon only - no circle background -->
        <div class="reset-icon">
            <i class="fas fa-key" id="main-icon"></i>
        </div>

        <!-- Headers -->
        <h1 id="main-title">Reset Password</h1>
        <p class="subtitle" id="main-subtitle">Enter your new password below</p>

        <!-- info badge -->
        <div class="info-badge" id="info-badge">
            <i class="fas fa-shield-alt"></i>
            <span id="badge-text">Create a strong password</span>
        </div>

        <!-- error alert -->
        <div id="errorAlert" class="error-message hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>

        <!-- success alert -->
        <div id="successAlert" class="success-message hidden">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <!-- Email display -->
        <div id="userEmailDisplay">
            <i class="fas fa-envelope"></i>
            <span id="displayEmail"></span>
        </div>

        <!-- Password form -->
        <div id="step2" class="form-container">
            <!-- New password field -->
            <div class="input-group">
                <label><i class="fas fa-key"></i> New password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password">
                    <button class="toggle-pw" id="toggleNew" type="button" tabindex="-1">
                        <i class="far fa-eye-slash" id="toggleNewIcon"></i>
                    </button>
                </div>
                <!-- strength indicator -->
                <div class="strength-bar" id="strengthBar">
                    <div class="strength-segment" id="seg1" style="background: rgba(255,255,255,0.1);"></div>
                    <div class="strength-segment" id="seg2" style="background: rgba(255,255,255,0.1);"></div>
                    <div class="strength-segment" id="seg3" style="background: rgba(255,255,255,0.1);"></div>
                </div>
                <div class="strength-text" id="strengthLabel">enter password</div>
                <div class="hint"><i class="fas fa-circle-info"></i> Min. 8 characters, with letter & number</div>
            </div>

            <!-- Confirm password field -->
            <div class="input-group">
                <label><i class="fas fa-check-circle"></i> Confirm password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Re-enter new password" autocomplete="off">
                    <button class="toggle-pw" id="toggleConfirm" type="button" tabindex="-1">
                        <i class="far fa-eye-slash" id="toggleConfirmIcon"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Action button -->
        <button class="btn" id="actionBtn">
            <i class="fas fa-sync-alt" id="btn-icon"></i> <span id="btn-text">Update Password</span>
        </button>

        <!-- Footer links removed -->
        
        <div class="divider">
            <span class="divider-line"></span>
            <i class="fas fa-lock"></i>
            <span class="divider-line"></span>
        </div>
        
        <p class="additional-note">
            <i class="fas fa-shield-halved"></i> Passwords are encrypted
        </p>
    </div>

    <script>
        // Initialize Supabase client
        const { createClient } = supabase;
        const supabaseClient = createClient(
            "https://tmyrnjdwaayelrctqppg.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteXJuamR3YWF5ZWxyY3RxcHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDgzODEsImV4cCI6MjA4Njg4NDM4MX0.w_DhdLWk4gA-x434kSobbXjG83IXHpakhRsaig-zMpw"
        );

        // Function to hash password using SHA-256
        async function hashPassword(password) {
            return CryptoJS.SHA256(password).toString();
        }

        (function() {
            // DOM elements
            const step2 = document.getElementById('step2');
            const actionBtn = document.getElementById('actionBtn');
            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');
            const mainTitle = document.getElementById('main-title');
            const mainSubtitle = document.getElementById('main-subtitle');
            const infoBadge = document.getElementById('info-badge');
            const badgeText = document.getElementById('badge-text');
            const mainIcon = document.getElementById('main-icon');
            const userEmailDisplay = document.getElementById('userEmailDisplay');
            const displayEmail = document.getElementById('displayEmail');
            
            const errorAlert = document.getElementById('errorAlert');
            const errorText = document.getElementById('errorText');
            const successAlert = document.getElementById('successAlert');
            const successText = document.getElementById('successText');

            // Input fields
            const newPass = document.getElementById('newPassword');
            const confirmPass = document.getElementById('confirmPassword');

            // Toggle buttons
            const toggleNew = document.getElementById('toggleNew');
            const toggleConfirm = document.getElementById('toggleConfirm');
            const toggleNewIcon = document.getElementById('toggleNewIcon');
            const toggleConfirmIcon = document.getElementById('toggleConfirmIcon');

            // strength elements
            const seg1 = document.getElementById('seg1');
            const seg2 = document.getElementById('seg2');
            const seg3 = document.getElementById('seg3');
            const strengthLabel = document.getElementById('strengthLabel');

            // State
            let userEmail = '';

            // Helper functions
            function hideError() {
                errorAlert.classList.add('hidden');
            }

            function showError(msg) {
                errorText.innerText = msg;
                errorAlert.classList.remove('hidden');
                successAlert.classList.add('hidden');
            }

            function showSuccess(msg) {
                successText.innerText = msg;
                successAlert.classList.remove('hidden');
                errorAlert.classList.add('hidden');
            }

            function clearAlerts() {
                errorAlert.classList.add('hidden');
                successAlert.classList.add('hidden');
            }

            // Toggle functions for password visibility
            function setupToggle(inputField, toggleIcon) {
                return function() {
                    const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                    inputField.setAttribute('type', type);
                    if (type === 'text') {
                        toggleIcon.classList.remove('fa-eye-slash');
                        toggleIcon.classList.add('fa-eye');
                    } else {
                        toggleIcon.classList.remove('fa-eye');
                        toggleIcon.classList.add('fa-eye-slash');
                    }
                };
            }

            if (toggleNew) {
                toggleNew.addEventListener('click', setupToggle(newPass, toggleNewIcon));
            }
            if (toggleConfirm) {
                toggleConfirm.addEventListener('click', setupToggle(confirmPass, toggleConfirmIcon));
            }

            // Strength meter
            function updateStrength(password) {
                if (!password) {
                    strengthLabel.innerText = 'enter password';
                    seg1.style.background = 'rgba(255,255,255,0.1)';
                    seg2.style.background = 'rgba(255,255,255,0.1)';
                    seg3.style.background = 'rgba(255,255,255,0.1)';
                    return;
                }
                
                const hasLetter = /[A-Za-z]/.test(password);
                const hasNumber = /[0-9]/.test(password);
                const hasSpecial = /[^A-Za-z0-9]/.test(password);
                const lengthOk = password.length >= 8;
                
                let score = 0;
                if (lengthOk) score += 1;
                if (hasLetter) score += 1;
                if (hasNumber) score += 1;
                if (hasSpecial && password.length > 6) score += 0.5;
                
                let level = Math.min(3, Math.floor(score));
                if (password.length > 12 && hasLetter && hasNumber && hasSpecial) level = 3;

                const colors = ['rgba(255,255,255,0.1)', '#ff6b6b', '#f97316', '#4caf50'];
                seg1.style.background = level >= 1 ? colors[1] : colors[0];
                seg2.style.background = level >= 2 ? colors[2] : colors[0];
                seg3.style.background = level >= 3 ? colors[3] : colors[0];

                if (level === 0) strengthLabel.innerText = 'too weak';
                else if (level === 1) strengthLabel.innerText = 'weak';
                else if (level === 2) strengthLabel.innerText = 'medium';
                else strengthLabel.innerText = 'strong';
            }

            if (newPass) {
                newPass.addEventListener('input', function(e) {
                    updateStrength(e.target.value);
                    if (confirmPass && confirmPass.value.length > 0) {
                        if (newPass.value !== confirmPass.value) showError('Passwords do not match');
                        else hideError();
                    }
                });
            }

            if (confirmPass) {
                confirmPass.addEventListener('input', function() {
                    if (newPass.value !== confirmPass.value) showError('Passwords do not match');
                    else hideError();
                });
            }

            // Extract recovery token and email from URL
            function getSessionFromUrl() {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                const type = hashParams.get('type');
                const email = hashParams.get('email');
                
                return { accessToken, refreshToken, type, email };
            }

            // Set the session from the URL hash
            async function setSessionFromUrl() {
                const { accessToken, refreshToken, type, email } = getSessionFromUrl();
                
                if (accessToken && refreshToken && type === 'recovery') {
                    try {
                        const { data, error } = await supabaseClient.auth.setSession({
                            access_token: accessToken,
                            refresh_token: refreshToken
                        });
                        
                        if (error) {
                            console.error('Error setting session:', error);
                            showError('Invalid or expired recovery link. Please request a new one.');
                            return false;
                        }
                        
                        if (data && data.user) {
                            userEmail = data.user.email || email;
                            
                            if (userEmail) {
                                displayEmail.textContent = userEmail;
                                userEmailDisplay.style.display = 'flex';
                            }
                            
                            showSuccess('Recovery link verified. You can now reset your password.');
                            return true;
                        }
                    } catch (err) {
                        console.error('Error setting session:', err);
                        showError('Failed to verify recovery link.');
                        return false;
                    }
                } else {
                    showError('Invalid recovery link. Please request a new password reset.');
                    return false;
                }
                return false;
            }

            // Update password in student table
            async function updatePasswordInDatabase(email, hashedPassword) {
                try {
                    const { data, error } = await supabaseClient
                        .from('student')
                        .update({ password: hashedPassword })
                        .eq('email', email)
                        .select();

                    if (error) {
                        console.error('Error updating password in student table:', error);
                        return { success: false, error: error.message };
                    }

                    if (data && data.length > 0) {
                        return { success: true, data };
                    } else {
                        return { success: false, error: 'No student record found with this email' };
                    }
                } catch (err) {
                    console.error('Error updating password:', err);
                    return { success: false, error: 'Database error occurred' };
                }
            }

            // Update password in Supabase Auth
            async function updateAuthPassword(newPassword) {
                try {
                    const { data, error } = await supabaseClient.auth.updateUser({
                        password: newPassword
                    });

                    if (error) {
                        console.error('Error updating auth password:', error);
                        return { success: false, error: error.message };
                    }

                    return { success: true, data };
                } catch (err) {
                    console.error('Error updating auth:', err);
                    return { success: false, error: 'Failed to update password' };
                }
            }

            // Main action: update password
            actionBtn.addEventListener('click', async function(e) {
                e.preventDefault();
                
                actionBtn.disabled = true;
                const originalHtml = actionBtn.innerHTML;
                actionBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Updating...';

                try {
                    const newPassword = newPass.value.trim();
                    const confirmPasswordValue = confirmPass.value.trim();

                    // Validate passwords
                    if (!newPassword || !confirmPasswordValue) {
                        showError('Please fill in both password fields');
                        actionBtn.disabled = false;
                        actionBtn.innerHTML = originalHtml;
                        return;
                    }

                    if (newPassword !== confirmPasswordValue) {
                        showError('Passwords do not match');
                        actionBtn.disabled = false;
                        actionBtn.innerHTML = originalHtml;
                        return;
                    }

                    if (newPassword.length < 8) {
                        showError('Password must be at least 8 characters');
                        actionBtn.disabled = false;
                        actionBtn.innerHTML = originalHtml;
                        return;
                    }

                    const hasLetter = /[A-Za-z]/.test(newPassword);
                    const hasNumber = /[0-9]/.test(newPassword);
                    if (!hasLetter || !hasNumber) {
                        showError('Use at least one letter and one number');
                        actionBtn.disabled = false;
                        actionBtn.innerHTML = originalHtml;
                        return;
                    }

                    // Update password in Supabase Auth
                    const authUpdate = await updateAuthPassword(newPassword);
                    
                    if (!authUpdate.success) {
                        showError('Failed to update authentication: ' + authUpdate.error);
                        actionBtn.disabled = false;
                        actionBtn.innerHTML = originalHtml;
                        return;
                    }

                    // Get current user to get email
                    const { data: { user } } = await supabaseClient.auth.getUser();
                    
                    if (!user || !user.email) {
                        showError('Could not verify user session');
                        actionBtn.disabled = false;
                        actionBtn.innerHTML = originalHtml;
                        return;
                    }

                    // Hash the password for student table
                    const hashedPassword = await hashPassword(newPassword);
                    
                    // Update password in student table
                    const dbUpdate = await updatePasswordInDatabase(user.email, hashedPassword);
                    
                    if (!dbUpdate.success) {
                        console.warn('Auth password updated but student table update failed:', dbUpdate.error);
                    }

                    // Success!
                    showSuccess('Password updated successfully! Redirecting to login...');
                    
                    // Sign out the user
                    await supabaseClient.auth.signOut();
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);

                } catch (error) {
                    console.error('Password update error:', error);
                    showError('An unexpected error occurred');
                    actionBtn.disabled = false;
                    actionBtn.innerHTML = originalHtml;
                }
            });

            // Initialize
            async function initialize() {
                const success = await setSessionFromUrl();
                
                if (!success) {
                    newPass.disabled = true;
                    confirmPass.disabled = true;
                    actionBtn.disabled = true;
                }
            }

            initialize();

        })();
    </script>
</body>
