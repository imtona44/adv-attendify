<!-- ===== PERSISTENT SIDEBAR COMPONENT - ENHANCED MOBILE VERSION ===== -->
<style>
    /* Enhanced variables for consistent styling */
    :root {
        --primary-dark: #0b2a3a;
        --primary-medium: #1a4a60;
        --accent-color: #1ea7d7;
        --accent-hover: #4fc9f0;
        --text-light: #dffaff;
        --text-medium: #a8d4e5;
        --shadow-heavy: 0 10px 40px rgba(0, 0, 0, 0.5);
        --shadow-light: 0 5px 15px rgba(0, 0, 0, 0.2);
        --transition-speed: 0.4s;
        --border-radius: 0 12px 12px 0;
    }
    
    /* Main sidebar container */
    .sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 280px;
        height: 100%;
        background: linear-gradient(180deg, var(--primary-dark) 0%, #0d3142 100%);
        display: flex;
        flex-direction: column;
        padding: 120px 0 40px 0;
        transition: var(--transition-speed) cubic-bezier(0.25, 0.46, 0.45, 0.94);
        z-index: 1002;
        box-shadow: var(--shadow-heavy);
        border-radius: var(--border-radius);
        overflow-y: auto;
        overflow-x: hidden;
    }
    
    /* Custom scrollbar for sidebar */
    .sidebar::-webkit-scrollbar {
        width: 5px;
    }
    
    .sidebar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
    }
    
    .sidebar::-webkit-scrollbar-thumb {
        background: var(--accent-color);
        border-radius: 10px;
    }
    
    .sidebar::-webkit-scrollbar-thumb:hover {
        background: var(--accent-hover);
    }
    
    /* Decorative background element */
    .sidebar::before {
        content: '';
        position: absolute;
        top: 0;
        right: -50px;
        width: 150px;
        height: 150px;
        background: radial-gradient(circle, rgba(30, 167, 215, 0.1) 0%, rgba(30, 167, 215, 0) 70%);
        border-radius: 50%;
        z-index: -1;
    }
    
    .sidebar.active {
        left: 0;
    }
    
    /* Sidebar links container */
    .sidebar-links {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 0 20px;
    }
    
    /* Individual link styling */
    .sidebar-link {
        color: var(--text-light);
        text-decoration: none;
        padding: 18px 24px;
        font-size: 1.15rem;
        font-weight: 500;
        letter-spacing: 0.3px;
        border-radius: 10px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        margin: 0 8px;
        background: rgba(255, 255, 255, 0.03);
        border-left: 3px solid transparent;
        word-break: break-word;
    }
    
    /* Link hover and active states */
    .sidebar-link:hover {
        background: rgba(30, 167, 215, 0.15);
        color: var(--text-light);
        border-left: 3px solid var(--accent-color);
        transform: translateX(5px);
        box-shadow: var(--shadow-light);
    }
    
    .sidebar-link:active {
        transform: translateX(5px) scale(0.98);
    }
    
    /* Indicator for current page */
    .sidebar-link.active {
        background: rgba(30, 167, 215, 0.2);
        color: var(--text-light);
        border-left: 3px solid var(--accent-color);
        font-weight: 600;
    }
    
    /* Loading indicator for navigation */
    .sidebar-link.loading::after {
        content: '';
        position: absolute;
        right: 20px;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    /* Sidebar header */
    .sidebar-header {
        padding: 0 28px 25px 28px;
        margin-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .sidebar-title {
        color: var(--text-light);
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 1px;
        margin: 0;
        text-transform: uppercase;
        line-height: 1.3;
    }
    
    .sidebar-subtitle {
        color: var(--text-medium);
        font-size: 0.9rem;
        margin-top: 5px;
        letter-spacing: 0.5px;
        line-height: 1.4;
    }
    
    /* Sidebar footer */
    .sidebar-footer {
        margin-top: auto;
        padding: 25px 28px 0 28px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-medium);
        font-size: 0.85rem;
        line-height: 1.5;
    }
    
    /* Overlay styling */
    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 10, 20, 0.7);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-speed) ease;
        z-index: 1000;
        backdrop-filter: blur(2px);
    }
    
    .overlay.active {
        opacity: 1;
        pointer-events: all;
    }
    
    /* Close button inside sidebar */
    .sidebar-close {
        position: absolute;
        top: 25px;
        right: 20px;
        background: none;
        border: none;
        color: var(--text-light);
        font-size: 1.8rem;
        cursor: pointer;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        z-index: 1003;
    }
    
    .sidebar-close:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: rotate(90deg);
    }
    
    /* ===== FULLY RESPONSIVE ADAPTATIONS ===== */
    
    /* Large tablets and small desktops */
    @media (max-width: 1024px) {
        .sidebar {
            width: 260px;
            left: -260px;
            padding: 100px 0 30px 0;
        }
        
        .sidebar-header {
            padding: 0 20px 20px 20px;
        }
        
        .sidebar-title {
            font-size: 1.3rem;
        }
        
        .sidebar-subtitle {
            font-size: 0.85rem;
        }
        
        .sidebar-link {
            padding: 16px 20px;
            font-size: 1.1rem;
            margin: 0 5px;
        }
        
        .sidebar-footer {
            padding: 20px 20px 0 20px;
            font-size: 0.8rem;
        }
        
        .sidebar-close {
            top: 20px;
            right: 15px;
            width: 35px;
            height: 35px;
            font-size: 1.6rem;
        }
    }
    
    /* Tablets (portrait) */
    @media (max-width: 768px) {
        .sidebar {
            width: 240px;
            left: -240px;
            padding: 80px 0 25px 0;
        }
        
        .sidebar-header {
            padding: 0 18px 18px 18px;
        }
        
        .sidebar-title {
            font-size: 1.2rem;
        }
        
        .sidebar-subtitle {
            font-size: 0.8rem;
        }
        
        .sidebar-link {
            padding: 14px 18px;
            font-size: 1rem;
            margin: 0 4px;
            border-radius: 8px;
        }
        
        .sidebar-footer {
            padding: 18px 18px 0 18px;
            font-size: 0.75rem;
        }
        
        .sidebar-close {
            top: 18px;
            right: 12px;
            width: 32px;
            height: 32px;
            font-size: 1.5rem;
        }
        
        .sidebar-links {
            gap: 4px;
            padding: 0 15px;
        }
    }
    
    /* Large phones */
    @media (max-width: 600px) {
        .sidebar {
            width: 220px;
            left: -220px;
            padding: 70px 0 20px 0;
        }
        
        .sidebar-header {
            padding: 0 15px 15px 15px;
        }
        
        .sidebar-title {
            font-size: 1.1rem;
        }
        
        .sidebar-subtitle {
            font-size: 0.75rem;
        }
        
        .sidebar-link {
            padding: 12px 15px;
            font-size: 0.95rem;
            margin: 0 3px;
            border-radius: 7px;
        }
        
        .sidebar-footer {
            padding: 15px 15px 0 15px;
            font-size: 0.7rem;
        }
        
        .sidebar-close {
            top: 15px;
            right: 10px;
            width: 28px;
            height: 28px;
            font-size: 1.4rem;
        }
        
        .sidebar-links {
            gap: 3px;
            padding: 0 12px;
        }
    }
    
    /* Medium phones */
    @media (max-width: 480px) {
        .sidebar {
            width: 100%;
            left: -100%;
            border-radius: 0;
            padding: 60px 0 20px 0;
        }
        
        .sidebar.active {
            left: 0;
        }
        
        .sidebar-header {
            padding: 0 20px 20px 20px;
        }
        
        .sidebar-title {
            font-size: 1.2rem;
        }
        
        .sidebar-subtitle {
            font-size: 0.8rem;
        }
        
        .sidebar-link {
            padding: 16px 20px;
            font-size: 1rem;
            margin: 0 8px;
            border-radius: 8px;
        }
        
        .sidebar-footer {
            padding: 20px 20px 0 20px;
            font-size: 0.75rem;
        }
        
        .sidebar-close {
            top: 20px;
            right: 20px;
            width: 35px;
            height: 35px;
            font-size: 1.6rem;
        }
        
        .sidebar-links {
            gap: 5px;
            padding: 0 15px;
        }
    }
    
    /* Small phones */
    @media (max-width: 400px) {
        .sidebar {
            padding: 50px 0 15px 0;
        }
        
        .sidebar-header {
            padding: 0 15px 15px 15px;
        }
        
        .sidebar-title {
            font-size: 1.1rem;
        }
        
        .sidebar-subtitle {
            font-size: 0.75rem;
        }
        
        .sidebar-link {
            padding: 14px 16px;
            font-size: 0.95rem;
            margin: 0 5px;
        }
        
        .sidebar-footer {
            padding: 15px 15px 0 15px;
            font-size: 0.7rem;
        }
        
        .sidebar-close {
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            font-size: 1.5rem;
        }
        
        .sidebar-links {
            gap: 4px;
            padding: 0 12px;
        }
    }
    
    /* Very small phones */
    @media (max-width: 360px) {
        .sidebar {
            padding: 45px 0 12px 0;
        }
        
        .sidebar-header {
            padding: 0 12px 12px 12px;
        }
        
        .sidebar-title {
            font-size: 1rem;
        }
        
        .sidebar-subtitle {
            font-size: 0.7rem;
        }
        
        .sidebar-link {
            padding: 12px 14px;
            font-size: 0.9rem;
            margin: 0 4px;
        }
        
        .sidebar-footer {
            padding: 12px 12px 0 12px;
            font-size: 0.65rem;
        }
        
        .sidebar-close {
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            font-size: 1.4rem;
        }
        
        .sidebar-links {
            gap: 3px;
            padding: 0 10px;
        }
    }
    
    /* Extra small phones */
    @media (max-width: 320px) {
        .sidebar {
            padding: 40px 0 10px 0;
        }
        
        .sidebar-header {
            padding: 0 10px 10px 10px;
        }
        
        .sidebar-title {
            font-size: 0.95rem;
        }
        
        .sidebar-subtitle {
            font-size: 0.65rem;
        }
        
        .sidebar-link {
            padding: 10px 12px;
            font-size: 0.85rem;
            margin: 0 3px;
        }
        
        .sidebar-footer {
            padding: 10px 10px 0 10px;
            font-size: 0.6rem;
        }
        
        .sidebar-close {
            top: 10px;
            right: 10px;
            width: 25px;
            height: 25px;
            font-size: 1.3rem;
        }
        
        .sidebar-links {
            gap: 2px;
            padding: 0 8px;
        }
    }
    
    /* Touch-friendly improvements */
    @media (hover: none) and (pointer: coarse) {
        .sidebar-link {
            -webkit-tap-highlight-color: transparent;
        }
        
        .sidebar-link:active {
            background: rgba(30, 167, 215, 0.25);
            transform: translateX(5px);
        }
        
        .sidebar-close:active {
            background: rgba(255, 255, 255, 0.15);
        }
    }
    
    /* Prevent body scroll when sidebar is open on mobile */
    body.sidebar-open {
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
</style>

<div id="sidebar" class="sidebar">
    <button class="sidebar-close" onclick="toggleMenu()" aria-label="Close menu">&times;</button>
    
    <div class="sidebar-header">
        <h2 class="sidebar-title">Admin Navigation</h2>
        <p class="sidebar-subtitle">Manage Platform</p>
    </div>
    
    <div class="sidebar-links">
        <!-- Home link with conditional navigation -->
        <a href="admin_home.html" id="homeLink" class="sidebar-link">Home</a>
        <a href="admin_grades.html" class="sidebar-link">Grades</a>
        <a href="admin_subjects.html" class="sidebar-link">Subjects</a>
        <a href="admin_students.html" class="sidebar-link">Students</a>
        <a href="admin_professors.html" class="sidebar-link">Request</a>
    </div>
    
    <div class="sidebar-footer">
        <p>© 2026 ADV-Attendify. All rights reserved.</p>
    </div>
</div>

<div id="overlay" class="overlay"></div>

<script>
(function() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    
    // Make sure sidebar starts hidden
    if (sidebar) {
        sidebar.classList.remove("active");
    }
    if (overlay) {
        overlay.classList.remove("active");
    }
    
    // Toggle sidebar function
    window.toggleMenu = function(){
        if (sidebar && overlay) {
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
            
            // Prevent body scroll when sidebar is open
            if (sidebar.classList.contains("active")) {
                document.body.style.overflow = "hidden";
                document.body.classList.add("sidebar-open");
            } else {
                document.body.style.overflow = "";
                document.body.classList.remove("sidebar-open");
            }
        }
    };
    
    // Close sidebar function
    function closeSidebar() {
        if (sidebar && overlay) {
            sidebar.classList.remove("active");
            overlay.classList.remove("active");
            document.body.style.overflow = "";
            document.body.classList.remove("sidebar-open");
        }
    }
    
    // Overlay click to close
    if (overlay) {
        overlay.onclick = closeSidebar;
    }
    
    // Close sidebar with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && sidebar && sidebar.classList.contains('active')) {
            closeSidebar();
        }
    });
    
    // Close sidebar when clicking on a link (for mobile)
    const links = document.querySelectorAll('.sidebar-link');
    links.forEach(link => {
        link.addEventListener('click', function(e) {
            // Don't close if it's the current page link (prevents flash)
            if (!this.classList.contains('active') && window.innerWidth <= 768) {
                // Add loading indicator
                this.classList.add('loading');
                setTimeout(() => {
                    closeSidebar();
                }, 150); // Small delay to allow navigation to start
            }
        });
    });
    
    // Handle window resize - close sidebar on larger screens if open
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function() {
            if (window.innerWidth > 1024 && sidebar && sidebar.classList.contains('active')) {
                closeSidebar();
            }
        }, 250);
    });
    
    // Highlight current page
    function highlightCurrentPage() {
        const currentPath = window.location.pathname;
        const currentPage = currentPath.split('/').pop() || 'admin_home.html';
        const links = document.querySelectorAll('.sidebar-link');
        let activeFound = false;
        
        links.forEach(link => {
            const linkHref = link.getAttribute('href');
            const linkPage = linkHref ? linkHref.split('/').pop() : '';
            
            // Remove loading class if exists
            link.classList.remove('loading');
            link.classList.remove('active');
            
            // Normalize both names for comparison
            const currentPageNormalized = currentPage.replace('.html', '').toLowerCase();
            const linkPageNormalized = linkPage.replace('.html', '').toLowerCase();
            
            // Add active class to current page
            if (linkPageNormalized === currentPageNormalized) {
                link.classList.add('active');
                activeFound = true;
            }
            
            // Special case for admin home
            if ((currentPageNormalized === '' || currentPageNormalized === 'index' || currentPageNormalized === 'admin_home') && 
                (linkPageNormalized === 'admin_home' || linkPageNormalized === 'home')) {
                link.classList.add('active');
                activeFound = true;
            }
        });
        
        // If no active link found (maybe on a different page), highlight Home as fallback
        if (!activeFound) {
            const homeLink = document.getElementById('homeLink');
            if (homeLink) {
                homeLink.classList.add('active');
            }
        }
    }
    
    // Run highlighting when page loads
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', highlightCurrentPage);
    } else {
        highlightCurrentPage();
    }
    
    // Also run highlighting on popstate (browser back/forward)
    window.addEventListener('popstate', highlightCurrentPage);
    
    // Expose closeSidebar for external use if needed
    window.closeSidebar = closeSidebar;
    window.openSidebar = function() {
        if (sidebar && overlay) {
            sidebar.classList.add("active");
            overlay.classList.add("active");
            document.body.style.overflow = "hidden";
            document.body.classList.add("sidebar-open");
        }
    };
})();
</script>
