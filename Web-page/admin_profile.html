<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Edit Profile | ADV-Attendify</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/websitelogo.png">

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- CryptoJS for password hashing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height:100vh;
            overflow:hidden;
            background:url("images/backgroundhome.png") center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
        }

        /* ================= NAVIGATION BAR ================= */
        .navbar {
            width: 100%;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 30, 50, 0.55);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(110, 243, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            flex-shrink: 0;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-btn {
            font-size: 28px;
            background: none;
            border: none;
            color: #6fe3ff;
            cursor: pointer;
            transition: 0.3s;
            padding: 5px;
        }

        .menu-btn:hover {
            color: #00f2ff;
            transform: scale(1.1);
        }

        .logo-text {
            color: #6ef3ff;
            font-size: 22px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(110, 243, 255, 0.5);
        }

        /* ================= MAIN CONTENT ================= */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .edit-container {
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            border-radius: 22px;
            background: rgba(20, 30, 50, 0.55);
            backdrop-filter: blur(18px) saturate(150%);
            border: 1px solid rgba(110, 243, 255, 0.25);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .edit-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .edit-container::-webkit-scrollbar {
            display: none;
        }

        .edit-header {
            text-align: center;
            padding: 25px 20px;
            border-bottom: 1px solid rgba(110, 243, 255, 0.2);
            flex-shrink: 0;
        }

        .edit-header h1 {
            color: #6ef3ff;
            font-size: 28px;
            font-weight: 700;
        }

        .edit-header span {
            display: block;
            width: 60px;
            height: 4px;
            margin: 10px auto 0;
            border-radius: 4px;
            background: linear-gradient(to right, #00f2ff, #7f5cff);
        }

        .edit-body {
            padding: 25px;
            overflow-y: auto;
            flex: 1;
        }

        .edit-body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .edit-body::-webkit-scrollbar {
            display: none;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #b8e9ff;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input::placeholder {
            color: #a9b4d6;
        }

        input:focus {
            outline: none;
            border-color: #00f2ff;
            box-shadow: 0 0 0 3px rgba(0, 242, 255, 0.35);
            background: rgba(255, 255, 255, 0.14);
        }

        .profile-picture-section {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .profile-picture-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto;
        }

        .profile-picture {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #6ef3ff;
            box-shadow: 0 0 20px rgba(110, 243, 255, 0.3);
            transition: all 0.3s ease;
        }

        .profile-picture:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(110, 243, 255, 0.5);
        }

        .change-photo-btn {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(110, 243, 255, 0.15);
            color: #6ef3ff;
            border: 2px solid #6ef3ff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .change-photo-btn:hover {
            background: rgba(110, 243, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3);
        }

        #fileInput {
            display: none;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 11px;
            margin-top: 3px;
            display: none;
            position: absolute;
            bottom: -16px;
            left: 0;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .save-btn, .cancel-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .save-btn {
            color: #020617;
            background: linear-gradient(135deg, #00f2ff, #7f5cff);
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #b8e9ff;
            border: 2px solid rgba(110, 243, 255, 0.3);
        }

        .save-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.5);
        }

        .cancel-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(110, 243, 255, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .save-btn:active:not(:disabled), .cancel-btn:active {
            transform: scale(0.97);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Custom SweetAlert2 styling */
        .swal2-popup {
            background: #0b2a3a !important;
            border-radius: 22px !important;
            border: 1px solid rgba(110, 243, 255, 0.25) !important;
        }

        .swal2-title {
            color: #6ef3ff !important;
        }

        .swal2-html-container {
            color: #dffaff !important;
        }

        .swal2-confirm {
            background: linear-gradient(135deg, #00f2ff, #7f5cff) !important;
            color: #020617 !important;
            font-weight: 600 !important;
            border-radius: 12px !important;
        }

        .password-hint {
            color: #a9b4d6;
            font-size: 11px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<!-- ================= NAVIGATION BAR ================= -->
<div class="navbar">
    <div class="nav-left">
        <button class="menu-btn" onclick="goBack()">←</button>
        <span class="logo-text">Edit Profile</span>
    </div>
</div>

<!-- ================= MAIN CONTENT ================= -->
<div class="main-content">
    <div class="edit-container">
        <div class="edit-header">
            <h1>Admin Profile</h1>
            <span></span>
        </div>

        <div class="edit-body">
            <!-- Profile Picture Section -->
            <div class="profile-picture-section">
                <div class="profile-picture-container">
                    <img src="images/profile2.png" id="profileImage" class="profile-picture" alt="Profile Picture">
                </div>
                <div class="upload-btn-container">
                    <label for="fileInput" class="change-photo-btn">Change Photo</label>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter Username">
                <div class="error-msg" id="username-error">Username is required</div>
            </div>

            <div class="input-group">
                <label>New Password (Leave blank to keep current)</label>
                <input type="password" id="newPassword" placeholder="Enter New Password">
                <div class="password-hint">Password must be at least 6 characters</div>
            </div>

            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm New Password">
                <div class="error-msg" id="confirmPassword-error">Passwords do not match</div>
            </div>

            <div class="button-group">
                <button class="save-btn" onclick="saveProfile()" id="saveBtn">Save Changes</button>
                <a href="admin_home.html" class="cancel-btn">Cancel</a>
            </div>
        </div>
    </div>
</div>

<!-- SweetAlert2 JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// Initialize Supabase client
const { createClient } = supabase;

const supabaseClient = createClient(
    "https://tmyrnjdwaayelrctqppg.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteXJuamR3YWF5ZWxyY3RxcHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDgzODEsImV4cCI6MjA4Njg4NDM4MX0.w_DhdLWk4gA-x434kSobbXjG83IXHpakhRsaig-zMpw"
);

// Flag to prevent multiple redirects
let isRedirecting = false;

// Default profile image
const DEFAULT_PROFILE_IMAGE = 'images/profile2.png';

// Function to hash password using SHA256
function hashPassword(password) {
    return CryptoJS.SHA256(password).toString();
}

// Function to go back
function goBack() {
    window.history.back();
}

// Redirect to login page
function redirectToLogin() {
    if (isRedirecting) return;
    isRedirecting = true;
    
    localStorage.removeItem('userId');
    localStorage.removeItem('userType');
    
    Swal.fire({
        title: 'Login Required',
        text: 'Please log in as admin to view your profile.',
        icon: 'warning',
        background: '#0b2a3a',
        color: '#dffaff',
        confirmButtonColor: '#00f2ff',
        confirmButtonText: 'Go to Login',
        allowOutsideClick: false,
        showCancelButton: false
    }).then(() => {
        window.location.href = 'index.html';
    });
}

// Load admin data from database
async function loadAdminData() {
    if (isRedirecting) return;
    
    try {
        const currentUserId = localStorage.getItem('userId');
        const userType = localStorage.getItem('userType');

        console.log('Loading admin with ID:', currentUserId, 'Type:', userType);

        if (!currentUserId || currentUserId === 'undefined' || currentUserId === 'null' || userType !== 'admin') {
            console.log('User not logged in as admin');
            redirectToLogin();
            return;
        }

        const { data: adminData, error } = await supabaseClient
            .from('admin')
            .select('*')
            .eq('id', parseInt(currentUserId))
            .maybeSingle();

        if (error) {
            console.error('Error loading admin data:', error);
            redirectToLogin();
            return;
        }

        if (adminData) {
            console.log('Admin data loaded:', adminData);
            
            document.getElementById('username').value = adminData.uname || '';
            
            if (adminData.prof_pic) {
                document.getElementById('profileImage').src = adminData.prof_pic;
                localStorage.setItem('profileImage', adminData.prof_pic);
            }
            
            localStorage.setItem('username', adminData.uname || '');
            localStorage.setItem('userFullName', adminData.uname || 'Admin');
        } else {
            console.log('No admin found with ID:', currentUserId);
            redirectToLogin();
        }
    } catch (error) {
        console.error('Error in loadAdminData:', error);
        redirectToLogin();
    }
}

// Profile picture upload functionality
document.getElementById('fileInput').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        if (file.size > 5 * 1024 * 1024) {
            Swal.fire({
                title: 'Error',
                text: 'Image size must be less than 5MB',
                icon: 'error',
                background: '#0b2a3a',
                color: '#dffaff',
                confirmButtonColor: '#00f2ff'
            });
            return;
        }

        if (!file.type.startsWith('image/')) {
            Swal.fire({
                title: 'Error',
                text: 'Please select an image file',
                icon: 'error',
                background: '#0b2a3a',
                color: '#dffaff',
                confirmButtonColor: '#00f2ff'
            });
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('profileImage').src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});

// Real-time password validation
document.getElementById('confirmPassword').addEventListener('input', function() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = this.value;
    const errorDiv = document.getElementById('confirmPassword-error');
    
    if (newPassword !== '' && confirmPassword !== '' && newPassword !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
    } else {
        errorDiv.style.display = 'none';
    }
});

// Real-time username validation
document.getElementById('username').addEventListener('input', function() {
    const username = this.value.trim();
    const errorDiv = document.getElementById('username-error');
    
    if (username === '') {
        errorDiv.textContent = 'Username is required';
        errorDiv.style.display = 'block';
    } else if (username.length < 3) {
        errorDiv.textContent = 'Username must be at least 3 characters';
        errorDiv.style.display = 'block';
    } else {
        errorDiv.style.display = 'none';
    }
});

// Check if username exists
async function checkUsernameExists(username) {
    try {
        const currentUserId = localStorage.getItem('userId');
        const { data, error } = await supabaseClient
            .from('admin')
            .select('id')
            .eq('uname', username)
            .neq('id', parseInt(currentUserId));
        
        return !error && data && data.length > 0;
    } catch (error) {
        console.error('Error checking username:', error);
        return false;
    }
}

// Save profile function
async function saveProfile() {
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';
    
    const username = document.getElementById('username').value.trim();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const currentUserId = localStorage.getItem('userId');
    
    console.log('Current User ID:', currentUserId);
    console.log('New Username:', username);
    console.log('Password provided:', newPassword ? 'Yes' : 'No');
    
    if (!currentUserId || currentUserId === 'undefined' || currentUserId === 'null') {
        redirectToLogin();
        return;
    }
    
    let valid = true;
    
    // Validate username
    if (username === '') {
        document.getElementById('username-error').textContent = 'Username is required';
        document.getElementById('username-error').style.display = 'block';
        valid = false;
    } else if (username.length < 3) {
        document.getElementById('username-error').textContent = 'Username must be at least 3 characters';
        document.getElementById('username-error').style.display = 'block';
        valid = false;
    } else {
        document.getElementById('username-error').style.display = 'none';
    }
    
    // Validate password
    if (newPassword !== '') {
        if (newPassword !== confirmPassword) {
            document.getElementById('confirmPassword-error').textContent = 'Passwords do not match';
            document.getElementById('confirmPassword-error').style.display = 'block';
            valid = false;
        } else if (newPassword.length < 6) {
            document.getElementById('confirmPassword-error').textContent = 'Password must be at least 6 characters';
            document.getElementById('confirmPassword-error').style.display = 'block';
            valid = false;
        } else {
            document.getElementById('confirmPassword-error').style.display = 'none';
        }
    }
    
    if (!valid) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
        return;
    }
    
    try {
        const updateData = {};
        const currentUsername = localStorage.getItem('username');
        const currentProfileImage = localStorage.getItem('profileImage');
        
        // Check username availability if changed
        if (username !== currentUsername) {
            const usernameExists = await checkUsernameExists(username);
            if (usernameExists) {
                document.getElementById('username-error').textContent = 'Username already taken';
                document.getElementById('username-error').style.display = 'block';
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Changes';
                return;
            }
            updateData.uname = username;
        }
        
        // Hash and add password if changed
        if (newPassword !== '') {
            const hashedPassword = hashPassword(newPassword);
            console.log('Original password:', newPassword);
            console.log('Hashed password:', hashedPassword);
            updateData.password = hashedPassword;
        }
        
        // Add profile picture if changed
        const profileImage = document.getElementById('profileImage').src;
        if (profileImage !== DEFAULT_PROFILE_IMAGE && 
            !profileImage.includes('images/profile2.png') && 
            profileImage !== currentProfileImage) {
            updateData.prof_pic = profileImage;
        }
        
        // If no changes
        if (Object.keys(updateData).length === 0) {
            Swal.fire({
                title: 'No Changes',
                text: 'No changes were made to your profile.',
                icon: 'info',
                timer: 1500,
                showConfirmButton: false,
                background: '#0b2a3a',
                color: '#dffaff'
            });
            setTimeout(() => {
                window.location.href = 'admin_home.html';
            }, 1500);
            return;
        }
        
        console.log('Updating with data:', updateData);
        
        // Update database
        const { error } = await supabaseClient
            .from('admin')
            .update(updateData)
            .eq('id', parseInt(currentUserId));
        
        if (error) {
            console.error('Update error:', error);
            throw error;
        }
        
        console.log('Update successful!');
        
        // Update localStorage
        if (updateData.uname) {
            localStorage.setItem('username', username);
            localStorage.setItem('userFullName', username);
        }
        
        if (updateData.prof_pic) {
            localStorage.setItem('profileImage', updateData.prof_pic);
        }
        
        // Clear password fields
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        
        Swal.fire({
            title: 'Success!',
            text: updateData.password ? 'Profile and password updated successfully!' : 'Profile updated successfully!',
            icon: 'success',
            timer: 2000,
            showConfirmButton: false,
            background: '#0b2a3a',
            color: '#dffaff'
        });
        
        setTimeout(() => {
            window.location.href = 'admin_home.html';
        }, 2000);
        
    } catch (error) {
        console.error('Error in saveProfile:', error);
        
        Swal.fire({
            title: 'Error',
            text: error.message || 'Failed to update profile',
            icon: 'error',
            background: '#0b2a3a',
            color: '#dffaff',
            confirmButtonColor: '#00f2ff'
        });
        
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
    }
}

// Load admin data on page load
document.addEventListener('DOMContentLoaded', function() {
    loadAdminData();
});
</script>

</body>
</html>
