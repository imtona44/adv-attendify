<body>

<!-- OFFLINE BANNER -->
<div id="offlineBanner" class="offline-banner">
    <i class="fas fa-wifi-slash"></i>
    <span id="offlineMessage">You are offline. Please check your internet connection.</span>
    <button onclick="checkConnectionAndReload()">Retry</button>
</div>

<div class="forgot-container">
    <div class="forgot-header">
        <h1>Forgot Password</h1>
        <span></span>
    </div>

    <div class="forgot-body">
        <!-- Email field -->
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <div class="error-msg" id="email-error">Email is required</div>
        </div>

        <!-- Username field -->
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
            <div class="error-msg" id="username-error">Username is required</div>
        </div>

        <!-- Success message div (hidden initially) -->
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <!-- Reset button -->
        <button class="reset-btn" onclick="handleResetRequest()" id="resetBtn">Send Reset Link</button>

        <!-- Simple helper text -->
        <p class="info-text">We'll send a password reset link to your email</p>

        <!-- Back to Login Link -->
        <div class="back-login">
            <a href="index.html">← Back to Login</a>
        </div>
    </div>
</div>

<script>
// Initialize Supabase client
const { createClient } = supabase;

const supabaseClient = createClient(
    "https://tmyrnjdwaayelrctqppg.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteXJuamR3YWF5ZWxyY3RxcHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDgzODEsImV4cCI6MjA4Njg4NDM4MX0.w_DhdLWk4gA-x434kSobbXjG83IXHpakhRsaig-zMpw"
);

// ===== OFFLINE DETECTION =====
let isOffline = !navigator.onLine;
const offlineBanner = document.getElementById('offlineBanner');
const resetBtn = document.getElementById('resetBtn');

// Function to update UI based on connection status
function updateOnlineStatus() {
    isOffline = !navigator.onLine;
    
    if (isOffline) {
        offlineBanner.style.display = 'block';
        resetBtn.disabled = true;
        resetBtn.title = 'You need an internet connection to request a reset link';
    } else {
        offlineBanner.style.display = 'none';
        resetBtn.disabled = false;
        resetBtn.title = '';
    }
}

// Function to check connection and reload if online
async function checkConnectionAndReload() {
    try {
        // Try to fetch a small resource to verify connection
        await fetch('https://tmyrnjdwaayelrctqppg.supabase.co/rest/v1/', {
            method: 'HEAD',
            mode: 'no-cors'
        });
        
        if (navigator.onLine) {
            offlineBanner.style.display = 'none';
            resetBtn.disabled = false;
        } else {
            alert('Unable to connect to the internet. Please check your connection.');
        }
    } catch (error) {
        alert('Unable to connect to the server. Please check your internet connection.');
    }
}

// Add event listeners for online/offline events
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// Initial check
updateOnlineStatus();

// Function to show success message
function showSuccessMessage(message) {
    const successDiv = document.getElementById('successMessage');
    const successText = document.getElementById('successText');
    successText.textContent = message;
    successDiv.style.display = 'block';
    
    // Hide after 5 seconds
    setTimeout(() => {
        successDiv.style.display = 'none';
    }, 5000);
}

// Function to check if student exists with matching email and username
async function verifyStudentCredentials(email, username) {
    try {
        const { data, error } = await supabaseClient
            .from('student')
            .select('email, uname')
            .eq('email', email)
            .eq('uname', username)
            .maybeSingle();

        if (error) {
            console.error('Database error:', error);
            return { success: false, error: 'Database error occurred' };
        }

        if (!data) {
            return { success: false, error: 'No student found with this email and username combination' };
        }

        return { success: true, data };
    } catch (error) {
        console.error('Error verifying student:', error);
        return { success: false, error: 'An error occurred while verifying your information' };
    }
}

// Main function: validate email + username, verify in database, then send reset email
async function handleResetRequest() {
    // Check if offline first
    if (isOffline) {
        alert('You are offline. Please check your internet connection and try again.');
        return;
    }

    const email = document.getElementById('email').value.trim();
    const username = document.getElementById('username').value.trim();
    let valid = true;

    // Reset error messages
    document.getElementById('email-error').style.display = 'none';
    document.getElementById('username-error').style.display = 'none';
    document.getElementById('email-error').innerText = 'Email is required';
    document.getElementById('username-error').innerText = 'Username is required';

    // Email validation
    if (email === '') {
        document.getElementById('email-error').style.display = 'block';
        valid = false;
    } else {
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            document.getElementById('email-error').innerText = 'Enter a valid email address';
            document.getElementById('email-error').style.display = 'block';
            valid = false;
        }
    }

    // Username validation
    if (username === '') {
        document.getElementById('username-error').style.display = 'block';
        valid = false;
    }

    if (!valid) {
        return;
    }

    // Disable button while processing
    resetBtn.disabled = true;
    resetBtn.textContent = 'Verifying...';

    try {
        // First verify that the student exists with matching email and username
        const verification = await verifyStudentCredentials(email, username);

        if (!verification.success) {
            // Show error message
            if (verification.error.includes('No student found')) {
                document.getElementById('email-error').innerText = verification.error;
                document.getElementById('email-error').style.display = 'block';
                document.getElementById('username-error').innerText = verification.error;
                document.getElementById('username-error').style.display = 'block';
            } else {
                alert(verification.error);
            }
            resetBtn.disabled = false;
            resetBtn.textContent = 'Send Reset Link';
            return;
        }

        // Student verified - send password reset email via Supabase with CORRECT redirect URL
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: "https://adv-attendify.org/reset-password.html" // CORRECTED URL
        });

        if (error) {
            console.error('Reset password error:', error);
            alert('Failed to send reset email: ' + error.message);
            resetBtn.disabled = false;
            resetBtn.textContent = 'Send Reset Link';
            return;
        }

        // Success! Show message and clear form
        showSuccessMessage(`Password reset link sent to ${email}! Please check your inbox.`);
        
        // Clear form
        document.getElementById('email').value = '';
        document.getElementById('username').value = '';

    } catch (error) {
        console.error('Unexpected error:', error);
        alert('An unexpected error occurred. Please try again.');
    } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Send Reset Link';
    }
}

// Expose functions globally
window.handleResetRequest = handleResetRequest;
window.checkConnectionAndReload = checkConnectionAndReload;
</script>
