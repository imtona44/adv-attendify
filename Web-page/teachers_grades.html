    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: url("images/backgroundhome.png") center/cover no-repeat fixed;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;

            display: flex;
            justify-content: space-between;
            align-items: center;

            background: none;

        .profile-wrapper {

        }

        }

        .profile img {

        }

            opacity: 1;

        }

        .profile-menu a {

            color: #dffaff;

            cursor: pointer;

        .profile-menu a:hover {
            background: #1ea7d7;

        }

        /* Sidebar styles */

        }

        .sidebar.active {

        }

        .sidebar .close-btn {
            background: none;
            border: none;
            color: #6fe3ff;
            font-size: 28px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {

        }

        .sidebar ul li a {
            color: #dffaff;

            font-size: 18px;
            display: flex;

            gap: 12px;
            transition: 0.2s;
        }

        .sidebar ul li a:hover {

            transform: translateX(5px);

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);

        .overlay.active {

        .section-header {

        .subjects-grid {

            border-color: #4caf50 !important;

        .submit-container {

    </style>

<!-- MAIN CONTENT -->

<!-- SweetAlert2 JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // ---------- SUPABASE INITIALIZATION ----------
    const { createClient } = supabase;
    
    const supabaseClient = createClient(
        "https://tmyrnjdwaayelrctqppg.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteXJuamR3YWF5ZWxyY3RxcHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDgzODEsImV4cCI6MjA4Njg4NDM4MX0.w_DhdLWk4gA-x434kSobbXjG83IXHpakhRsaig-zMpw"
    );

    // ---------- OFFLINE DETECTION ----------
    let isOffline = !navigator.onLine;

    function updateOfflineBanner() {
        const banner = document.getElementById('offlineBanner');
        if (banner) banner.style.display = isOffline ? 'block' : 'none';
    }

    window.addEventListener('online',  () => { isOffline = false; updateOfflineBanner(); });
    window.addEventListener('offline', () => { isOffline = true;  updateOfflineBanner(); });
    updateOfflineBanner();

    function checkConnectionAndReload() {
        if (navigator.onLine) {
            isOffline = false;
            updateOfflineBanner();
            location.reload();
        }
    }
    window.checkConnectionAndReload = checkConnectionAndReload;

    // ---------- PROFILE MENU ----------
    function toggleProfileMenu() {
        document.getElementById('profileMenu').classList.toggle('active');
    }
    window.toggleProfileMenu = toggleProfileMenu;

    function getCurrentProfessorId() {
        return localStorage.getItem('userId') || localStorage.getItem('professorId');
    }

    function getYearText(year) {
        const years = { '1': '1st Year', '2': '2nd Year', '3': '3rd Year', '4': '4th Year' };
        return years[year] || 'Unknown Year';
    }

    function formatAcademicTerm(academicTerm) {
        if (!academicTerm) return '';
        const parts = academicTerm.split('-');
        if (parts.length === 2) {
            const year = parts[0];
            const term = parts[1];
            const yearText = { '1': '1st Year', '2': '2nd Year', '3': '3rd Year', '4': '4th Year' }[year] || `Year ${year}`;
            const termText = { '1': 'First Semester', '2': 'Second Semester', 'S': 'Summer' }[term] || `Term ${term}`;
            return `${yearText} - ${termText}`;
        }
        return academicTerm;
    }

    function formatDateTime(timestamp) {
        if (!timestamp) return '—';
        const date = new Date(timestamp);
        return date.toLocaleDateString('en-US', {
            month: 'numeric', day: 'numeric', year: 'numeric',
            hour: 'numeric', minute: '2-digit', hour12: true
        });
    }

    async function loadProfileImage() {
        const navImg = document.getElementById('navProfileImage');
        const professorId = getCurrentProfessorId();
        if (!professorId) { navImg.src = 'images/profile.png'; return; }
        try {
            const { data, error } = await supabaseClient
                .from('professor').select('profile-pic').eq('uid', professorId).single();
            if (error) { navImg.src = 'images/profile.png'; return; }
            navImg.src = (data && data['profile-pic']) ? data['profile-pic'] : 'images/profile.png';
        } catch (error) {
            navImg.src = 'images/profile.png';
        }
    }

    function confirmLogout() {
        Swal.fire({
            title: 'Are you sure?', text: "You will be logged out of your account!", icon: 'warning',
            showCancelButton: true, confirmButtonColor: '#00f2ff', cancelButtonColor: '#ff6b6b',
            confirmButtonText: 'Yes, logout', cancelButtonText: 'Cancel',
            background: '#0b2a3a', color: '#dffaff'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.clear();
                Swal.fire({ title: 'Logged Out!', text: 'You have been successfully logged out.', icon: 'success', confirmButtonColor: '#00f2ff', background: '#0b2a3a', color: '#dffaff' })
                    .then(() => { window.location.href = 'index.html'; });
            }
        });
    }

    // ---------- SIDEBAR ----------
    fetch('teachers_sidebar.html')
        .then(r => r.text())
        .then(html => {
            document.getElementById('sidebarContainer').innerHTML = html;
            initializeSidebar();
        })
        .catch(error => {
            const fallbackSidebar = `
                <div class="sidebar" id="sidebar">
                    <button class="close-btn" onclick="toggleMenu()">✕</button>
                    <ul><li><a href="#">Dashboard</a></li><li><a href="#">Subjects</a></li><li><a href="#">Students</a></li></ul>
                </div>
                <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
            `;
            document.getElementById('sidebarContainer').innerHTML = fallbackSidebar;
            initializeSidebar();
        });

    function initializeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        if (sidebar && overlay) {
            window.toggleMenu = function() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            };
        } else {
            window.toggleMenu = function() { console.warn('sidebar not ready'); };
        }
    }

    // ===== NEW: Close grades panel function =====
    function closeGradesPanel() {
        document.getElementById('gradesPanel').style.display = 'none';
        currentSubjectId = null;
        currentEnrollments = [];
    }
    window.closeGradesPanel = closeGradesPanel;

    // ---------- DATA ----------
    let subjects = [];
    let currentSubjectId = null;
    let currentEnrollments = [];

    async function fetchProfessorSubjects() {
        try {
            const professorId = getCurrentProfessorId();
            if (!professorId) return;
            const { data, error } = await supabaseClient
                .from('subjects').select('*').eq('prof_id', professorId);
            if (error) return;
            subjects = data ? data.map(item => ({
                id: item.id, name: item.sub, code: item.sub_code,
                professorId: item.prof_id, professorName: item.professor_name,
                academicTerm: item.academic_term, section: item.section
            })) : [];
            renderSubjectCards();
        } catch (error) { console.error('Error:', error); }
    }

    async function fetchEnrollmentsForSubject(subjectId) {
        try {
            const { data, error } = await supabaseClient
                .from('enrollment_sub')
                .select(`enroll_id, stud_id, year_section, grades, date_time, sub_id, student:stud_id (id, fname, lname, "year-section")`)
                .eq('sub_id', subjectId).order('stud_id', { ascending: true });
            if (error) return [];
            currentEnrollments = data || [];
            return data || [];
        } catch (error) { return []; }
    }

    function getGradeStatus(gradeValue) {
        if (!gradeValue || gradeValue.trim() === '') return { text: 'PENDING', class: 'status-pending' };
        const upperGrade = gradeValue.trim().toUpperCase();
        if (upperGrade === 'IP' || upperGrade === 'IN PROGRESS') return { text: 'IN PROGRESS', class: 'status-progress' };
        const numGrade = parseFloat(gradeValue);
        if (isNaN(numGrade)) return { text: 'INVALID', class: 'status-failed' };
        if (numGrade >= 75 && numGrade <= 100) return { text: 'PASSED', class: 'status-passed' };
        if (numGrade < 75) return { text: 'FAILED', class: 'status-failed' };
        return { text: 'INVALID', class: 'status-failed' };
    }

    function getGradeInputClass(gradeValue) {
        if (!gradeValue || gradeValue.trim() === '') return 'grade-pending';
        const upperGrade = gradeValue.trim().toUpperCase();
        if (upperGrade === 'IP' || upperGrade === 'IN PROGRESS') return 'grade-progress';
        const numGrade = parseFloat(gradeValue);
        if (isNaN(numGrade)) return 'grade-invalid';
        if (numGrade >= 75 && numGrade <= 100) return 'grade-good';
        return 'grade-warning';
    }

    function updateStatusCapsule(enrollId, gradeValue) {
        const statusCapsule = document.getElementById(`status-${enrollId}`);
        if (statusCapsule) {
            const status = getGradeStatus(gradeValue);
            statusCapsule.textContent = status.text;
            statusCapsule.className = `status-capsule ${status.class}`;
        }
    }

    async function renderSubjectCards() {
        const container = document.getElementById('subjectsContainer');
        if (subjects.length === 0) {
            container.innerHTML = '<div class="placeholder-text">No subjects found.</div>';
            return;
        }
        container.innerHTML = '';
        for (const sub of subjects) {
            const enrollments = await fetchEnrollmentsForSubject(sub.id);
            const studentCount = enrollments.length;
            const termDisplay = sub.academicTerm ? formatAcademicTerm(sub.academicTerm) : '';
            let setDisplay = '';
            if (sub.section) {
                if (sub.section === 'Any') setDisplay = 'Any Set';
                else if (sub.section.length === 1) setDisplay = `${sub.section}`;
                else setDisplay = `${sub.section.slice(-1)}`;
            }
            const card = document.createElement('div');
            card.className = 'subject-card';
            let cardContent = `<h3>${sub.name}</h3><p>${sub.code || ''}</p>`;
            if (termDisplay) cardContent += `<p style="color: #6fe3ff; font-size: 0.85rem; margin-top: 5px;">${termDisplay}</p>`;
            if (setDisplay) cardContent += `<p style="color: #a0e7ff; font-size: 0.8rem; margin-top: 3px;">${setDisplay}</p>`;
            cardContent += `<p style="margin-top: 10px; opacity: 0.7;">${studentCount} student${studentCount !== 1 ? 's' : ''} enrolled</p>`;
            card.innerHTML = cardContent;
            card.addEventListener('click', () => openSubjectGrades(sub.id));
            container.appendChild(card);
        }
    }

    async function openSubjectGrades(subjectId) {
        const subject = subjects.find(s => s.id === subjectId);
        if (!subject) return;
        currentSubjectId = subjectId;
        const panel = document.getElementById('gradesPanel');
        panel.style.display = 'block';
        document.getElementById('selectedSubjectTitle').innerText = `${subject.name} (${subject.code || 'no code'}) - All Enrolled Students`;
        document.getElementById('gradesContent').innerHTML = '<div class="loading-spinner">Loading students...</div>';
        await renderGradesTable(subject);
    }

    async function renderGradesTable(subject) {
        const container = document.getElementById('gradesContent');
        const enrollments = await fetchEnrollmentsForSubject(subject.id);
        if (!enrollments || enrollments.length === 0) {
            container.innerHTML = '<div class="placeholder-text">No students enrolled in this subject.</div>';
            return;
        }
        let enrolledStudents = [];
        for (const enrollment of enrollments) {
            if (enrollment.student) {
                const student = enrollment.student;
                const fullName = `${student.fname || ''} ${student.lname || ''}`.trim() || 'Unknown Student';
                enrolledStudents.push({
                    enroll_id: enrollment.enroll_id, studentId: student.id,
                    studentIdDisplay: student.id || 'N/A', name: fullName,
                    yearSection: student['year-section'] || enrollment.year_section || 'N/A',
                    grades: enrollment.grades || '', dateTime: enrollment.date_time || null
                });
            }
        }
        enrolledStudents.sort((a, b) => {
            if (a.yearSection !== b.yearSection) return a.yearSection.localeCompare(b.yearSection);
            return a.name.localeCompare(b.name);
        });
        let tableHTML = `<div class="grades-table-container"><table class="grades-table"><thead><tr><th>Student ID</th><th>Student Name</th><th>Year & Section</th><th>Grades</th><th>Status</th><th>Last Updated</th></tr></thead><tbody>`;
        enrolledStudents.forEach(student => {
            const lastUpdatedDisplay = student.dateTime ? formatDateTime(student.dateTime) : '<span class="last-updated never">—</span>';
            const lastUpdatedClass = student.dateTime ? 'last-updated' : 'last-updated never';
            const gradeClass = getGradeInputClass(student.grades);
            const status = getGradeStatus(student.grades);
            tableHTML += `<tr data-student-id="${student.studentId}" data-enroll-id="${student.enroll_id}">
                <td class="student-id">${student.studentIdDisplay}</td><td class="student-name">${student.name}</td>
                <td class="student-year-section">${student.yearSection}</td>
                <td><input type="text" class="grades-input ${gradeClass}" value="${student.grades}" placeholder="—" data-enroll-id="${student.enroll_id}" oninput="handleGradeInput(event)" onkeypress="handleGradesKeyPress(event, '${student.enroll_id}')" onblur="handleGradesBlur(event, '${student.enroll_id}')"></td>
                <td><span class="status-capsule ${status.class}" id="status-${student.enroll_id}">${status.text}</span></td>
                <td class="${lastUpdatedClass}" id="updated-${student.enroll_id}">${lastUpdatedDisplay}</td>
            </tr>`;
        });
        tableHTML += `</tbody></table></div>`;
        container.innerHTML = tableHTML;
    }

    function handleGradeInput(event) {
        const input = event.target;
        const enrollId = input.getAttribute('data-enroll-id');
        const newGrades = input.value.trim();
        input.classList.remove('grade-good', 'grade-warning', 'grade-invalid', 'grade-pending', 'grade-progress');
        const gradeClass = getGradeInputClass(newGrades);
        input.classList.add(gradeClass);
        const status = getGradeStatus(newGrades);
        const statusCapsule = document.getElementById(`status-${enrollId}`);
        if (statusCapsule) { statusCapsule.textContent = status.text; statusCapsule.className = `status-capsule ${status.class}`; }
        const enrollment = currentEnrollments.find(e => e.enroll_id == enrollId);
        if (enrollment) enrollment.grades = newGrades;
    }

    function handleGradesKeyPress(event, enrollId) {
        if (event.key === 'Enter') {
            event.preventDefault();
            const input = event.target;
            input.classList.add('saved');
            setTimeout(() => input.classList.remove('saved'), 500);
        }
    }

    function handleGradesBlur(event, enrollId) {
        const input = event.target;
        input.classList.add('saved');
        setTimeout(() => input.classList.remove('saved'), 500);
        updateStatusCapsule(enrollId, input.value.trim());
    }

    async function submitAllGrades() {
        // Keep your existing submitAllGrades function unchanged
        const gradeInputs = document.querySelectorAll('.grades-input');
        const pendingGrades = []; const convertedGrades = []; const ipGrades = [];
        gradeInputs.forEach(input => {
            const enrollId = input.getAttribute('data-enroll-id');
            const currentValue = input.value.trim();
            const enrollment = currentEnrollments.find(e => e.enroll_id == enrollId);
            const studentName = input.closest('tr')?.querySelector('.student-name')?.textContent || 'Unknown';
            if (enrollment && currentValue !== '') {
                const upperValue = currentValue.toUpperCase();
                if (upperValue === 'IP' || upperValue === 'IN PROGRESS') {
                    ipGrades.push({ studentName, value: 'IP' });
                    pendingGrades.push({ enrollId, input, value: 'IP', studentName, wasConverted: false, isIP: true });
                    return;
                }
                let numGrade = parseFloat(currentValue);
                let finalGrade = currentValue;
                let wasConverted = false;
                if (isNaN(numGrade)) return;
                if (numGrade > 100) return;
                if (numGrade < 75) { finalGrade = '70'; wasConverted = true; convertedGrades.push({ studentName, original: currentValue, final: '70' }); }
                pendingGrades.push({ enrollId, input, value: finalGrade, studentName, wasConverted, isIP: false });
            }
        });
        if (pendingGrades.length === 0) {
            Swal.fire({ title: 'No Grades to Submit', text: 'Please enter valid grades before submitting.', icon: 'info', background: '#0b2a3a', color: '#dffaff', confirmButtonColor: '#00f2ff' });
            return;
        }
        if (convertedGrades.length > 0) {
            let convertMessage = '<div style="text-align: left; max-height: 200px; overflow-y: auto;"><p style="margin-bottom: 10px; color: #ffd966;">⚠️ The following grades are below 75 and will be recorded as <strong>70</strong> (Failed):</p><ul style="margin-left: 20px;">';
            convertedGrades.forEach(item => { convertMessage += `<li><strong>${item.studentName}</strong>: ${item.original} → 70</li>`; });
            convertMessage += '</ul></div>';
            await Swal.fire({ title: '⚠️ Grades Will Be Converted', html: convertMessage, icon: 'warning', background: '#0b2a3a', color: '#dffaff', confirmButtonColor: '#00f2ff' });
        }
        if (ipGrades.length > 0) {
            let ipMessage = '<div style="text-align: left; max-height: 200px; overflow-y: auto;"><p style="margin-bottom: 10px; color: #ff9800;">📝 The following students are marked as <strong>In Progress (IP)</strong>:</p><ul style="margin-left: 20px;">';
            ipGrades.forEach(item => { ipMessage += `<li><strong>${item.studentName}</strong>: IP</li>`; });
            ipMessage += '</ul></div>';
            await Swal.fire({ title: '📋 In Progress Grades', html: ipMessage, icon: 'info', background: '#0b2a3a', color: '#dffaff', confirmButtonColor: '#00f2ff' });
        }
        let summaryMessage = '<div style="text-align: left; max-height: 300px; overflow-y: auto;">';
        summaryMessage += `<p style="margin-bottom: 10px;">You are about to submit <strong>${pendingGrades.length}</strong> grade(s):</p><ul style="margin-left: 20px;">`;
        const displayCount = Math.min(pendingGrades.length, 10);
        for (let i = 0; i < displayCount; i++) {
            const grade = pendingGrades[i];
            let displayText;
            if (grade.isIP) displayText = '<span style="color: #ff9800;">IP (In Progress)</span>';
            else if (grade.wasConverted) displayText = `<span style="color: #ffd966;">${grade.value} (was ${grade.input.value})</span>`;
            else displayText = grade.value;
            summaryMessage += `<li><strong>${grade.studentName}</strong>: ${displayText}</li>`;
        }
        if (pendingGrades.length > 10) summaryMessage += `<li>... and ${pendingGrades.length - 10} more</li>`;
        summaryMessage += '</ul><p style="margin-top: 15px; color: #ffd966;">⚠️ This action is final but can be changed anytime.</p></div>';
        const result = await Swal.fire({ title: 'Submit All Grades?', html: summaryMessage, icon: 'warning', showCancelButton: true, confirmButtonColor: '#00f2ff', cancelButtonColor: '#6c757d', confirmButtonText: 'Yes, submit all', cancelButtonText: 'Cancel', background: '#0b2a3a', color: '#dffaff' });
        if (!result.isConfirmed) return;
        Swal.fire({ title: 'Submitting Grades...', text: `Saving ${pendingGrades.length} grade(s) to database...`, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }, background: '#0b2a3a', color: '#dffaff' });
        let successCount = 0; let failCount = 0; const submitTime = new Date().toISOString();
        for (const item of pendingGrades) {
            const { error } = await supabaseClient.from('enrollment_sub').update({ grades: item.value, date_time: submitTime }).eq('enroll_id', item.enrollId);
            if (!error) {
                successCount++;
                const enrollment = currentEnrollments.find(e => e.enroll_id == item.enrollId);
                if (enrollment) { enrollment.grades = item.value; enrollment.date_time = submitTime; }
                item.input.value = item.value;
                item.input.classList.remove('grade-good', 'grade-warning', 'grade-invalid', 'grade-pending', 'grade-progress');
                item.input.classList.add(getGradeInputClass(item.value), 'saved');
                updateStatusCapsule(item.enrollId, item.value);
                const updatedCell = document.getElementById(`updated-${item.enrollId}`);
                if (updatedCell) {
                    const now = new Date();
                    updatedCell.textContent = now.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
                    updatedCell.className = 'last-updated';
                }
                setTimeout(() => item.input.classList.remove('saved'), 500);
            } else { failCount++; }
        }
        Swal.close();
        if (failCount === 0) {
            let successMessage = `All ${successCount} grade(s) have been submitted successfully.`;
            if (convertedGrades.length > 0) successMessage += ` ${convertedGrades.length} grade(s) were recorded as 70 (Failed).`;
            if (ipGrades.length > 0) successMessage += ` ${ipGrades.length} student(s) marked as In Progress (IP).`;
            Swal.fire({ title: 'Success!', text: successMessage, icon: 'success', background: '#0b2a3a', color: '#dffaff', confirmButtonColor: '#00f2ff', timer: 3000, timerProgressBar: true });
        } else {
            Swal.fire({ title: 'Partial Success', text: `${successCount} grade(s) saved, ${failCount} failed.`, icon: 'warning', background: '#0b2a3a', color: '#dffaff', confirmButtonColor: '#00f2ff' });
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await loadProfileImage();
        await fetchProfessorSubjects();
        window.addEventListener('click', function(e) {
            const profileMenu = document.getElementById('profileMenu');
            const profilePic = document.querySelector('.profile');
            if (!profilePic?.contains(e.target) && !profileMenu?.contains(e.target)) profileMenu?.classList.remove('active');
        });
    });

    (function checkLogin() {
        if (!getCurrentProfessorId()) window.location.href = 'index.html';
    })();

    window.openSubjectGrades = openSubjectGrades;
    window.handleGradeInput = handleGradeInput;
    window.handleGradesKeyPress = handleGradesKeyPress;
    window.handleGradesBlur = handleGradesBlur;
    window.confirmLogout = confirmLogout;
    window.submitAllGrades = submitAllGrades;
</script>
