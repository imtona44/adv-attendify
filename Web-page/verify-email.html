<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Email | ADV-Attendify</title>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0b1120, #1a2639);
            color: white;
            margin: 0;
        }

        .verification-box {
            background: rgba(20, 30, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(110, 243, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #6ef3ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success {
            color: #6ef3ff;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .error {
            color: #ff6b6b;
        }

        .login-link {
            color: #6ef3ff;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 20px;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="verification-box">
        <div id="status">
            <div class="spinner"></div>
            <h2>Verifying your email...</h2>
            <p>Please wait while we confirm your account.</p>
        </div>
    </div>

    <script>
        // Initialize Supabase client
        const { createClient } = supabase;
        const supabaseClient = createClient(
            "https://tmyrnjdwaayelrctqppg.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteXJuamR3YWF5ZWxyY3RxcHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDgzODEsImV4cCI6MjA4Njg4NDM4MX0.w_DhdLWk4gA-x434kSobbXjG83IXHpakhRsaig-zMpw"
        );

        // Function to show status message
        function setStatus(type, title, message) {
            const statusDiv = document.getElementById('status');
            if (type === 'success') {
                statusDiv.innerHTML = `
                    <div class="success">✓ ${title}</div>
                    <p>${message}</p>
                    <p>Redirecting to homepage...</p>
                `;
            } else if (type === 'error') {
                statusDiv.innerHTML = `
                    <div class="error">✗ ${title}</div>
                    <p>${message}</p>
                    <a href="login.html" class="login-link">Go to Login</a>
                `;
            }
        }

        // Main verification function
        async function verifyEmail() {
            try {
                // Get the current session
                const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();

                if (sessionError) {
                    throw new Error('Failed to get session: ' + sessionError.message);
                }

                if (!session) {
                    // No session – maybe the user opened this page directly without confirmation link
                    setStatus('error', 'No session found', 'Please check your email and click the confirmation link again.');
                    return;
                }

                const user = session.user;
                const email = user.email;

                // Check if email is confirmed
                if (!user.email_confirmed_at) {
                    setStatus('error', 'Email not verified', 'Your email address has not been confirmed yet. Please check your inbox.');
                    return;
                }

                // Email is confirmed – now move from pending_students to student table
                // 1. Fetch pending data
                const { data: pending, error: pendingError } = await supabaseClient
                    .from('pending_students')
                    .select('*')
                    .eq('email', email)
                    .single();

                if (pendingError) {
                    // If no pending record, maybe already moved or not a student
                    if (pendingError.code === 'PGRST116') { // No rows found
                        // Check if already in student table
                        const { data: existingStudent, error: studentCheckError } = await supabaseClient
                            .from('student')
                            .select('email')
                            .eq('email', email)
                            .maybeSingle();

                        if (existingStudent) {
                            setStatus('success', 'Already verified!', 'Your account is already active. Redirecting...');
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 2000);
                            return;
                        } else {
                            setStatus('error', 'No pending registration', 'No pending registration found for this email.');
                        }
                    } else {
                        throw new Error('Error fetching pending record: ' + pendingError.message);
                    }
                    return;
                }

                // 2. Insert into student table
                const { error: insertError } = await supabaseClient
                    .from('student')
                    .insert([
                        {
                            fname: pending.fname,
                            lname: pending.lname,
                            id: pending.id,
                            uname: pending.uname,
                            email: pending.email,
                            password: pending.password
                        }
                    ]);

                if (insertError) {
                    throw new Error('Failed to create student account: ' + insertError.message);
                }

                // 3. Delete from pending_students
                await supabaseClient
                    .from('pending_students')
                    .delete()
                    .eq('email', email);

                // Success – redirect to index.html
                setStatus('success', 'Email Verified!', 'Your account has been activated.');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('Verification error:', error);
                setStatus('error', 'Verification Failed', error.message || 'An unexpected error occurred.');
            }
        }

        // Run on page load
        window.addEventListener('DOMContentLoaded', verifyEmail);
    </script>
</body>
</html>
