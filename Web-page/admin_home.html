/* ===== OFFLINE BANNER ===== */
.offline-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #ff6b6b;
    color: white;
    text-align: center;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    z-index: 10000;
    display: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    backdrop-filter: blur(5px);
    border-bottom: 1px solid #ff8a8a;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from {
        transform: translateY(-100%);
    }
    to {
        transform: translateY(0);
    }
}

.offline-banner i {
    margin-right: 8px;
}

.offline-banner button {
    background: white;
    color: #ff6b6b;
    border: none;
    padding: 4px 12px;
    border-radius: 20px;
    margin-left: 15px;
    font-weight: 600;

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// Initialize Supabase client
const { createClient } = supabase;

const supabaseClient = createClient(
    "https://tmyrnjdwaayelrctqppg.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteXJuamR3YWF5ZWxyY3RxcHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMDgzODEsImV4cCI6MjA4Njg4NDM4MX0.w_DhdLWk4gA-x434kSobbXjG83IXHpakhRsaig-zMpw"
);

// ===== OFFLINE DETECTION =====
let isOffline = !navigator.onLine;
const offlineBanner = document.getElementById('offlineBanner');

function updateOnlineStatus() {
    isOffline = !navigator.onLine;
    
    if (isOffline) {
        offlineBanner.style.display = 'block';
    } else {
        offlineBanner.style.display = 'none';
    }
}

async function checkConnectionAndReload() {
    try {
        const response = await fetch('https://tmyrnjdwaayelrctqppg.supabase.co/rest/v1/', {
            method: 'HEAD',
            mode: 'no-cors'
        });
        
        if (navigator.onLine) {
            offlineBanner.style.display = 'none';
            Swal.fire({
                title: 'Connected!',
                text: 'You are back online.',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false,
                background: '#0b2a3a',
                color: '#dffaff'
            });
            loadAdminData();
        } else {
            Swal.fire({
                title: 'Still Offline',
                text: 'Unable to connect to the internet. Please check your connection.',
                icon: 'error',
                background: '#0b2a3a',
                color: '#dffaff',
                confirmButtonColor: '#00f2ff'
            });
        }
    } catch (error) {
        Swal.fire({
            title: 'Connection Failed',
            text: 'Unable to connect to the server. Please check your internet connection.',
            icon: 'error',
            background: '#0b2a3a',
            color: '#dffaff',
            confirmButtonColor: '#00f2ff'
        });
    }
}

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// Default image path
const DEFAULT_PROFILE_IMAGE = 'images/profile2.png';
const DEFAULT_NAV_IMAGE = 'images/profile.png';

// Flag to prevent multiple redirects
let isRedirecting = false;

// Function to load admin data from database
async function loadAdminData() {
    if (isRedirecting) return;
    
    if (isOffline) {
        loadFromLocalStorage();
        return;
    }
    
    try {
        let currentUserId = localStorage.getItem('userId');
        const userType = localStorage.getItem('userType');
        const username = localStorage.getItem('username');

        console.log('Loading admin with:', { currentUserId, userType, username });

        if (!currentUserId || currentUserId === 'undefined' || currentUserId === 'null' || userType !== 'admin') {
            console.log('User not logged in as admin');
            redirectToLogin();
            return;
        }

        console.log('Fetching admin with ID:', currentUserId);
        
        const { data: adminData, error } = await supabaseClient
            .from('admin')
            .select('*')
            .eq('id', parseInt(currentUserId))
            .maybeSingle();

        if (error) {
            console.error('Error loading admin data:', error);
            loadFromLocalStorage();
            return;
        }

        if (adminData) {
            console.log('Admin data found:', adminData);
            displayAdminData(adminData);
        } else {
            console.log('No admin found with ID:', currentUserId);
            
            if (username) {
                const { data: usernameData } = await supabaseClient
                    .from('admin')
                    .select('*')
                    .eq('uname', username)
                    .maybeSingle();
                
                if (usernameData) {
                    console.log('Found admin by username:', usernameData);
                    localStorage.setItem('userId', usernameData.id.toString());
                    displayAdminData(usernameData);
                    return;
                }
            }
            
            loadFromLocalStorage();
        }
    } catch (error) {
        console.error('Error in loadAdminData:', error);
        loadFromLocalStorage();
    }
}

// Display admin data from database
function displayAdminData(admin) {
    const displayName = admin.uname || 'Admin';
    document.getElementById('adminNameDisplay').textContent = displayName;
    
    if (admin.prof_pic) {
        document.getElementById('mainProfileImage').src = admin.prof_pic;
        document.getElementById('navProfileImage').src = admin.prof_pic;
        localStorage.setItem('profileImage', admin.prof_pic);
    } else {
        document.getElementById('mainProfileImage').src = DEFAULT_PROFILE_IMAGE;
        document.getElementById('navProfileImage').src = DEFAULT_NAV_IMAGE;
        localStorage.removeItem('profileImage');
    }
    
    localStorage.setItem('userId', admin.id.toString());
    localStorage.setItem('userType', 'admin');
    localStorage.setItem('username', admin.uname);
    localStorage.setItem('userFullName', admin.uname);
}

// Load from localStorage as fallback
function loadFromLocalStorage() {
    console.log('Loading admin data from localStorage');
    
    const username = localStorage.getItem('username');
    if (username) {
        document.getElementById('adminNameDisplay').textContent = username;
    } else {
        document.getElementById('adminNameDisplay').textContent = 'Admin';
    }
    
    const savedImage = localStorage.getItem('profileImage');
    if (savedImage) {
        document.getElementById('mainProfileImage').src = savedImage;
        document.getElementById('navProfileImage').src = savedImage;
    } else {
        document.getElementById('mainProfileImage').src = DEFAULT_PROFILE_IMAGE;
        document.getElementById('navProfileImage').src = DEFAULT_NAV_IMAGE;
    }
    
    const userType = localStorage.getItem('userType');
    if (userType !== 'admin') {
        console.log('User is not admin in localStorage');
    }
}

// Redirect to login page
function redirectToLogin() {
    if (isRedirecting) return;
    isRedirecting = true;
    
    localStorage.removeItem('userId');
    localStorage.removeItem('userType');
    localStorage.removeItem('profileImage');
    localStorage.removeItem('username');
    localStorage.removeItem('userFullName');
    
    Swal.fire({
        title: 'Login Required',
        text: 'Please log in as admin to view this page.',
        icon: 'warning',
        background: '#0b2a3a',
        color: '#dffaff',
        confirmButtonColor: '#00f2ff',
        confirmButtonText: 'Go to Login',
        allowOutsideClick: false,
        showCancelButton: false
    }).then(() => {
        window.location.href = 'index.html';
    });
}

/* ===== load sidebar component ===== */
fetch("admin_sidebar.html")
.then(r => r.text())
.then(html => {
    document.getElementById("sidebarContainer").innerHTML = html;
    initializeSidebar();
})
.catch(error => {
    console.error('Error loading sidebar:', error);
});

function initializeSidebar() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    
    if (sidebar && overlay) {
        window.toggleMenu = function(){
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
        };
        
        overlay.onclick = toggleMenu;
    }
}

// Logout confirmation function
function confirmLogout() {
    Swal.fire({
        title: 'Are you sure?',
        text: "You will be logged out of your account!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#00f2ff',
        cancelButtonColor: '#ff6b6b',
        confirmButtonText: 'Yes, logout',
        cancelButtonText: 'Cancel',
        background: '#0b2a3a',
        color: '#dffaff'
    }).then((result) => {
        if (result.isConfirmed) {
            localStorage.clear();
            
            Swal.fire({
                title: 'Logged Out!',
                text: 'You have been successfully logged out.',
                icon: 'success',
                confirmButtonColor: '#00f2ff',
                background: '#0b2a3a',
                color: '#dffaff'
            }).then(() => {
                window.location.href = 'index.html';
            });
        }
    });
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    loadAdminData();
});

/* profile dropdown */
function toggleProfileMenu(){
    const profileMenu = document.getElementById("profileMenu");
    profileMenu.classList.toggle("active");
}

document.addEventListener("click", function(e){
    const profile = document.querySelector(".profile");
    const menu = document.getElementById("profileMenu");
    if(profile && menu && !profile.contains(e.target) && !menu.contains(e.target)){
        menu.classList.remove("active");
    }
});

// Listen for storage changes to update profile in real-time
window.addEventListener('storage', function(e) {
    if (e.key === 'username') {
        document.getElementById('adminNameDisplay').textContent = e.newValue;
    }
    if (e.key === 'profileImage') {
        document.getElementById('mainProfileImage').src = e.newValue || DEFAULT_PROFILE_IMAGE;
        document.getElementById('navProfileImage').src = e.newValue || DEFAULT_NAV_IMAGE;
    }
});

let refreshInterval = setInterval(loadAdminData, 30000);

window.addEventListener('beforeunload', function() {
    clearInterval(refreshInterval);
});

// Expose functions globally
window.checkConnectionAndReload = checkConnectionAndReload;
window.toggleMenu = toggleMenu;
window.toggleProfileMenu = toggleProfileMenu;
window.confirmLogout = confirmLogout;
</script>
